<script type="module">

import {
db,
collection,
getDocs
}
from './firebase.js';

/* ДАННЫЕ ПРОФИЛЯ */

document.getElementById("username").innerText =
"Участник партии";

document.getElementById("email").innerText =
"party-user@russia.ru";

document.getElementById("uid").innerText =
"RMRP-" + Math.floor(Math.random()*999999);

document.getElementById("created").innerText =
new Date().toLocaleDateString("ru-RU");

/* ЗАЯВЛЕНИЯ */

const apps =
await getDocs(collection(db,"applications"));

document.getElementById("appsCount").innerText =
apps.size;

/* НОВОСТИ */

const news =
await getDocs(collection(db,"news"));

document.getElementById("newsCount").innerText =
news.size;

/* АВАТАР */

const savedAvatar =
localStorage.getItem("avatar");

if(savedAvatar){

document.getElementById("avatar").src =
savedAvatar;

}

/* СМЕНА АВАТАРКИ */

document.getElementById("avatarInput")
.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

document.getElementById("avatar").src =
event.target.result;

localStorage.setItem(
"avatar",
event.target.result
);

};

reader.readAsDataURL(file);

});

/* КНОПКА ВЫХОДА */

document.getElementById("logoutBtn")
.addEventListener("click",()=>{

alert("Вы вышли из профиля");

window.location.href="index.html";

});

</script>
