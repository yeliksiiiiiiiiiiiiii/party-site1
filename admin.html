<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Админ панель</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7ff;
display:flex;
}

.sidebar{
width:260px;
height:100vh;
background:#00154d;
padding:30px 20px;
position:fixed;
left:-190px;
transition:0.4s;
z-index:999;
}

.sidebar:hover{
left:0;
}

.sidebar h2{
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px;
background:#0039a6;
margin-bottom:15px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.sidebar a:hover{
background:#d52b1e;
}

.main{
margin-left:80px;
padding:40px;
width:100%;
}

.title{
font-size:40px;
color:#0039a6;
margin-bottom:30px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.card h3{
margin-bottom:20px;
color:#0039a6;
}

.user{
padding:15px;
background:#eef3ff;
border-radius:12px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
background:#0039a6;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#d52b1e;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Админка</h2>

<a href="index.html">Главная</a>

<a href="#">Пользователи</a>

<a href="#">Новости</a>

<a href="#">Заявки</a>

</div>

<div class="main">

<div class="title">
Панель администратора
</div>

<div class="card">

<h3>Пользователи</h3>

<div id="users"></div>

</div>

</div>

<script>

let currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(
!currentUser ||
(
currentUser.role !== "admin" &&
currentUser.role !== "owner"
){
}

let users=JSON.parse(localStorage.getItem("users"))||[];

let usersDiv=document.getElementById("users");

function renderUsers(){

usersDiv.innerHTML="";

users.forEach((user,index)=>{

usersDiv.innerHTML+=`

<div class="user">

Роль: ${
user.role === "owner"
? "Владелец"
: user.role === "admin"
? "Администратор"
: "Пользователь"
}

<button onclick="makeAdmin(${index})">
Сделать админом
</button>

</div>

`;

});

}

function makeAdmin(index){

users[index].role="admin";

localStorage.setItem("users",JSON.stringify(users));

renderUsers();

alert("Пользователь теперь администратор");

}

renderUsers();

</script>

</body>
</html>
