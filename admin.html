<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ панель
</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:#071739;
color:white;
}

header{
background:#00154d;
padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px black;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
background:#0b1d57;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
padding:12px 20px;
border-radius:12px;
background:#132b75;
transition:0.3s;
font-size:17px;
}

nav a:hover{
background:#0051ff;
transform:translateY(-3px);
}

.container{
width:90%;
max-width:1200px;
margin:50px auto;
}

.app-card{
background:#0b1d57;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.app-card h2{
margin-top:0;
}

.buttons{
display:flex;
gap:15px;
margin-top:20px;
}

.buttons button{
padding:14px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.approve{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}

.buttons button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<header>
Админ панель
</header>

<nav>

<a href="index.html">
Главная
</a>

<a href="news.html">
Новости
</a>

<a href="leaders.html">
Руководство

</a>

<a href="admin.html">
Админ панель
</a>
  
<a href="chat.html">
Общий чат
</a>

</nav>

<div class="container">

<div id="applicationsList">

<h2>
Загрузка заявок...
</h2>

</div>

</div>

<script type="module">

import {
db,
collection,
getDocs,
deleteDoc,
doc,
updateDoc
}
from './firebase.js';

const container =
document.getElementById(
"applicationsList"
);

async function loadApps(){

container.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"applications")
);

querySnapshot.forEach((d)=>{

const app = d.data();

container.innerHTML += `

<div class="app-card">

<h2>
${app.fullname}
</h2>

<p>
<b>Discord:</b>
${app.discord}
</p>

<p>
<b>IC возраст:</b>
${app.icage}
</p>

<p>
<b>OOC возраст:</b>
${app.oocage}
</p>

<p>
<b>Почему хочет вступить:</b>
<br>
${app.why}
</p>

<p>
<b>Чем поможет:</b>
<br>
${app.help}
</p>

<p>
<b>Статус:</b>
${app.status}
</p>

<div class="buttons">

<button
class="approve"
onclick="approveApp('${d.id}')"
>
Одобрить
</button>

<button
class="delete"
onclick="deleteApp('${d.id}')"
>
Удалить
</button>

</div>

</div>

`;

});

}

window.deleteApp =
async function(id){

await deleteDoc(
doc(db,"applications",id)
);

loadApps();

}

window.approveApp =
async function(id){

await updateDoc(
doc(db,"applications",id),
{
status:"approved"
}
);

loadApps();

}

loadApps();

</script>

</body>
</html>
