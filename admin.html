<!-- ADMIN.HTML FULL -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#071739;
color:white;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{

position:fixed;
left:-240px;
top:0;

width:300px;
height:100%;

background:#00154d;

padding-top:30px;

transition:0.4s;

z-index:999;

box-shadow:0 0 20px black;

}

.sidebar:hover{

left:0;

}

.sidebar::before{

content:"☰ Админ панель";

position:absolute;

right:-170px;
top:20px;

background:#00154d;

padding:15px 25px;

border-radius:0 15px 15px 0;

font-size:22px;
font-weight:bold;

cursor:pointer;

}

/* SIDEBAR LINKS */

.sidebar a{

display:block;

color:white;
text-decoration:none;

padding:18px 25px;

margin:10px;

border-radius:12px;

background:#0b1d57;

transition:0.3s;

font-size:18px;

}

.sidebar a:hover{

background:#0051ff;
transform:translateX(5px);

}

/* HEADER */

header{

background:#00154d;

padding:30px;

text-align:center;

font-size:40px;
font-weight:bold;

box-shadow:0 0 20px black;

}

/* CONTAINER */

.container{

width:90%;
max-width:1200px;

margin:40px auto;

}

/* BLOCK */

.block{

background:#0b1d57;

padding:30px;

border-radius:25px;

margin-bottom:40px;

box-shadow:0 0 20px rgba(0,0,0,0.4);

}

/* TITLES */

.title{

font-size:35px;

margin-bottom:30px;

color:#4da3ff;

}

/* CARDS */

.card{

background:#132b75;

padding:25px;

border-radius:20px;

margin-bottom:20px;

animation:fade 0.3s;

}

.card h2{

margin-bottom:15px;

}

.card p{

margin-bottom:10px;

line-height:1.6;

}

/* BUTTONS */

.buttons{

display:flex;

gap:15px;

margin-top:20px;

flex-wrap:wrap;

}

.buttons button{

padding:14px 20px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:0.3s;

}

.approve{

background:green;
color:white;

}

.delete{

background:red;
color:white;

}

.admin{

background:#0051ff;
color:white;

}

.buttons button:hover{

transform:scale(1.05);

}

/* INPUTS */

input,
textarea{

width:100%;

padding:15px;

margin-bottom:20px;

border:none;

border-radius:12px;

background:#132b75;

color:white;

font-size:17px;

}

textarea{

height:200px;
resize:none;

}

/* PUBLISH */

.publish-btn{

width:100%;

padding:18px;

border:none;

border-radius:15px;

background:#0051ff;

color:white;

font-size:20px;

cursor:pointer;

transition:0.3s;

}

.publish-btn:hover{

background:#2f6dff;

}

/* EMPTY */

.empty{

text-align:center;

padding:40px;

font-size:25px;

opacity:0.7;

}

/* ANIMATION */

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<a href="#applications">
Проверка заявок
</a>

<a href="#users">
Список пользователей
</a>

<a href="#news">
Публикация новостей
</a>

<a href="index.html">
На сайт
</a>

<a href="#publishNewsSection">
Публикация новостей
</a>

</div>

<!-- HEADER -->

<header>
Админ панель партии
</header>

<!-- MAIN -->

<div class="container">

<!-- APPLICATIONS -->

<div
class="block"
id="applications"
>

<h1 class="title">
Проверка заявок
</h1>

<div id="applicationsList">

<div class="empty">
Загрузка...
</div>

</div>

</div>

<!-- USERS -->

<div
class="block"
id="users"
>

<h1 class="title">
Список пользователей
</h1>

<div id="usersList">

<div class="empty">
Загрузка...
</div>

</div>

</div>

<!-- NEWS -->

<div
class="block"
id="news"
>

<h1 class="title">
Публикация новостей
</h1>

<input
type="text"
id="newsTitle"
placeholder="Название новости"
>

<input
type="text"
id="newsImage"
placeholder="Ссылка на фото"
>

<textarea
id="newsText"
placeholder="Текст новости"
></textarea>

<button
class="publish-btn"
onclick="publishNews()"
>

Опубликовать новость

</button>

</div>

</div>

<script type="module">

import {

db,

collection,
getDocs,
addDoc,

deleteDoc,
doc,
updateDoc

}

from './firebase.js';

/* APPLICATIONS */

const appsContainer =
document.getElementById(
"applicationsList"
);

async function loadApps(){

appsContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"applications")
);

if(querySnapshot.empty){

appsContainer.innerHTML = `

<div class="empty">

Заявок нет

</div>

`;

return;

}

querySnapshot.forEach((documentData)=>{

const app =
documentData.data();

appsContainer.innerHTML += `

<div class="card">

<h2>
${app.fullname}
</h2>

<p>
<b>Discord:</b>
${app.discord}
</p>

<p>
<b>IC возраст:</b>
${app.icage}
</p>

<p>
<b>OOC возраст:</b>
${app.oocage}
</p>

<p>
<b>Почему хочет вступить:</b>
<br><br>
${app.why}
</p>

<p>
<b>Статус:</b>
${app.status}
</p>

<div class="buttons">

<button
class="approve"
onclick="approveApp('${documentData.id}')"
>
Одобрить
</button>

<button
class="delete"
onclick="deleteApp('${documentData.id}')"
>
Удалить
</button>

</div>

</div>

`;

});

}

window.approveApp =
async function(id){

await updateDoc(
doc(db,"applications",id),
{
status:"approved"
}
);

loadApps();

}

window.deleteApp =
async function(id){

await deleteDoc(
doc(db,"applications",id)
);

loadApps();

}

/* USERS */

const usersContainer =
document.getElementById(
"usersList"
);

async function loadUsers(){

usersContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"users")
);

if(querySnapshot.empty){

usersContainer.innerHTML = `

<div class="empty">

Пользователей нет

</div>

`;

return;

}

querySnapshot.forEach((documentData)=>{

const user =
documentData.data();

usersContainer.innerHTML += `

<div class="card">

<h2>
${user.email}
</h2>

<p>
<b>Роль:</b>
${user.role}
</p>

<div class="buttons">

<button
class="admin"
onclick="makeAdmin('${documentData.id}')"
>
Выдать Admin
</button>

</div>

</div>

`;

});

}

window.makeAdmin =
async function(id){

await updateDoc(
doc(db,"users",id),
{
role:"admin"
}
);

loadUsers();

}

/* NEWS */

window.publishNews =
async function(){

const title =
document.getElementById(
"newsTitle"
).value;

const image =
document.getElementById(
"newsImage"
).value;

const text =
document.getElementById(
"newsText"
).value;

if(title=="" || text==""){

alert(
"Заполните поля"
);

return;

}

await addDoc(
collection(db,"news"),
{

title:title,
image:image,
text:text,

date:
new Date().toLocaleString()

}
);

alert(
"Новость опубликована"
);

document.getElementById(
"newsTitle"
).value = "";

document.getElementById(
"newsImage"
).value = "";

document.getElementById(
"newsText"
).value = "";

}

/* START */

loadApps();
loadUsers();

</script>

</body>
</html>
