<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Ultra Admin Panel
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#06153a;
color:white;
overflow-x:hidden;
}

/* LOGIN */

.login-page{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
linear-gradient(rgba(0,20,70,0.92),rgba(0,20,70,0.95)),
url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=2070");
background-size:cover;
background-position:center;
}

.login-box{
width:600px;
background:#0d235f;
padding:50px;
border-radius:35px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.login-logo{
width:120px;
height:120px;
background:white;
padding:10px;
border-radius:25px;
margin-bottom:25px;
object-fit:contain;
}

.login-box h1{
font-size:65px;
margin-bottom:10px;
}

.login-box p{
font-size:22px;
color:#9ecbff;
margin-bottom:35px;
}

.login-box input{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:#17348d;
color:white;
font-size:22px;
margin-bottom:25px;
outline:none;
}

.login-box button{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:#4c7cff;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#6a92ff;
transform:translateY(-3px);
}

/* PANEL */

.admin-panel{
display:none;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#0d235f;
padding:30px;
border-radius:25px;
margin-bottom:35px;
}

.topbar h1{
font-size:45px;
}

.logout-btn{
padding:15px 30px;
border:none;
border-radius:15px;
background:#dc2626;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

/* CARD */

.card{
background:#0d235f;
padding:30px;
border-radius:30px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.card h2{
font-size:34px;
margin-bottom:25px;
color:#77a7ff;
}

/* USERS */

.user{
background:#17348d;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.user h3{
font-size:22px;
margin-bottom:10px;
}

.user p{
margin-top:5px;
font-size:17px;
color:#dbeafe;
}

.role-select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:15px;
background:#0d235f;
color:white;
font-size:16px;
}

.role-btn{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

/* APPLICATIONS */

.application{
background:#17348d;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

.application h3{
font-size:24px;
margin-bottom:12px;
}

.application p{
margin-top:8px;
font-size:16px;
}

.app-buttons{
display:flex;
gap:12px;
margin-top:20px;
}

.accept-btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.reject-btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#dc2626;
color:white;
font-weight:bold;
cursor:pointer;
}

/* NEWS */

.card input,
.card textarea{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#17348d;
color:white;
font-size:18px;
margin-bottom:18px;
outline:none;
}

.card textarea{
height:180px;
resize:none;
}

.publish-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.publish-btn:hover{
background:#3b82f6;
}

.news-item{
background:#17348d;
padding:18px;
border-radius:18px;
margin-top:20px;
}

.news-item img{
width:100%;
border-radius:16px;
margin-top:12px;
}

@media(max-width:900px){

.topbar{
flex-direction:column;
gap:20px;
}

.login-box{
width:95%;
}

.login-box h1{
font-size:42px;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-page">

<div class="login-box">

<img
src="logo.png"
class="login-logo"
>

<h1>
ADMIN PANEL
</h1>

<p>
Введите пароль администратора
</p>

<input
type="password"
id="password"
placeholder="Пароль"
>

<button id="loginBtn">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div class="admin-panel">

<div class="topbar">

<h1>
Ultra Admin Panel
</h1>

<button
class="logout-btn"
id="logoutBtn"
>
Выйти
</button>

</div>

<div class="grid">

<!-- USERS -->

<div class="card">

<h2>
Пользователи
</h2>

<div id="usersList"></div>

</div>

<!-- APPLICATIONS -->

<div class="card">

<h2>
Проверка заявок
</h2>

<div id="applicationsList"></div>

</div>

<!-- NEWS -->

<div class="card">

<h2>
Публикация новости
</h2>

<input
type="text"
id="newsTitle"
placeholder="Название новости"
>

<input
type="text"
id="newsImage"
placeholder="Ссылка на фото"
>

<textarea
id="newsText"
placeholder="Текст новости"
></textarea>

<button
class="publish-btn"
id="publishBtn"
>
Опубликовать
</button>

<div id="newsList"></div>

</div>

</div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from './firebase.js';

/* PASSWORD */

const ADMIN_PASSWORD =
"1234567890mtrp9";

document
.getElementById("loginBtn")
.addEventListener("click",()=>{

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document.querySelector(".login-page").style.display =
"none";

document.querySelector(".admin-panel").style.display =
"block";

loadUsers();
loadApplications();
loadNews();

}else{

alert("Неверный пароль");

}

});

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener("click",()=>{

location.reload();

});

/* USERS */

async function loadUsers(){

const usersList =
document.getElementById("usersList");

usersList.innerHTML = "";

const snap =
await getDocs(collection(db,"users"));

snap.forEach(docSnap=>{

const data = docSnap.data();

usersList.innerHTML += `

<div class="user">

<h3>
${data.email}
</h3>

<p>
Роль:
${data.role || "Участник"}
</p>

<p>
Дата:
${data.created || "Неизвестно"}
</p>

<select
class="role-select"
id="role-${docSnap.id}"
>

<option>
Участник
</option>

<option>
Ветеран Партии
</option>

<option>
Председатель Партии
</option>

<option>
Заместитель
</option>

<option>
Модератор
</option>

<option>
Пресс-служба
</option>

</select>

<button
class="role-btn"
onclick="setRole('${docSnap.id}')"
>
Выдать роль
</button>

</div>

`;

});

}

/* ROLE */

window.setRole =
async(id)=>{

const role =
document.getElementById(
`role-${id}`
).value;

await updateDoc(
doc(db,"users",id),
{
role:role
}
);

alert("Роль выдана");

loadUsers();

};

/* APPLICATIONS */

async function loadApplications(){

const applicationsList =
document.getElementById("applicationsList");

applicationsList.innerHTML = "";

const snap =
await getDocs(collection(db,"applications"));

snap.forEach(docSnap=>{

const app = docSnap.data();

applicationsList.innerHTML += `

<div class="application">

<h3>
${app.fullname}
</h3>

<p>
Discord:
${app.discord}
</p>

<p>
IC возраст:
${app.icage}
</p>

<p>
OOC возраст:
${app.oocage}
</p>

<p>
${app.why}
</p>

<div class="app-buttons">

<button
class="accept-btn"
onclick="acceptApplication('${docSnap.id}')"
>
Одобрить
</button>

<button
class="reject-btn"
onclick="rejectApplication('${docSnap.id}')"
>
Отклонить
</button>

</div>

</div>

`;

});

}

/* ACCEPT */

window.acceptApplication =
async(id)=>{

await updateDoc(
doc(db,"applications",id),
{
status:"accepted"
}
);

alert("Заявка одобрена");

loadApplications();

};

/* REJECT */

window.rejectApplication =
async(id)=>{

await deleteDoc(
doc(db,"applications",id)
);

alert("Заявка отклонена");

loadApplications();

};

/* PUBLISH NEWS */

document
.getElementById("publishBtn")
.addEventListener("click",async()=>{

const title =
document.getElementById("newsTitle").value;

const image =
document.getElementById("newsImage").value;

const text =
document.getElementById("newsText").value;

if(!title || !text){

alert("Заполните поля");
return;

}

await addDoc(
collection(db,"news"),
{

title,
image,
text,

date:
new Date().toLocaleString("ru-RU")

}
);

alert("Новость опубликована");

document.getElementById("newsTitle").value="";
document.getElementById("newsImage").value="";
document.getElementById("newsText").value="";

loadNews();

});

/* LOAD NEWS */

async function loadNews(){

const newsList =
document.getElementById("newsList");

newsList.innerHTML = "";

const snap =
await getDocs(collection(db,"news"));

snap.forEach(docSnap=>{

const data = docSnap.data();

newsList.innerHTML += `

<div class="news-item">

<h3>
${data.title}
</h3>

<p style="margin-top:10px;">
${data.text}
</p>

${
data.image
?
`<img src="${data.image}">`
:
""
}

<p style="
margin-top:10px;
color:#9ecbff;
">
${data.date}
</p>

</div>

`;

});

}

</script>

</body>
</html>
