<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Ultra Admin Panel
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#06153a;
color:white;
overflow-x:hidden;
}

/* LOGIN SCREEN */

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:
linear-gradient(rgba(4,17,59,0.95),rgba(4,17,59,0.98)),
url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.login-box{
width:500px;
background:#0b1d57;
padding:50px;
border-radius:35px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.login-box img{
width:110px;
height:110px;
background:white;
padding:8px;
border-radius:20px;
margin-bottom:25px;
}

.login-box h1{
font-size:45px;
font-weight:900;
margin-bottom:15px;
}

.login-box p{
font-size:20px;
margin-bottom:35px;
color:#9ecbff;
}

.login-box input{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:#10296b;
color:white;
font-size:18px;
outline:none;
margin-bottom:25px;
}

.login-box button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:#2f6dff;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#4f84ff;
transform:translateY(-3px);
}

/* PANEL */

#adminPanel{
display:none;
}

/* SIDEBAR */

.sidebar{
width:320px;
height:100vh;
background:#04113b;
position:fixed;
left:0;
top:0;
padding:35px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:15px;
margin-bottom:50px;
}

.logo img{
width:70px;
height:70px;
background:white;
padding:6px;
border-radius:18px;
}

.logo h1{
font-size:30px;
font-weight:900;
line-height:1;
}

.menu{
display:flex;
flex-direction:column;
gap:18px;
}

.menu button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#0d235f;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
}

.menu button:hover{
background:#2f6dff;
transform:translateX(5px);
}

.logout{
background:#ff3434 !important;
}

/* MAIN */

.main{
margin-left:320px;
padding:40px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.topbar h1{
font-size:60px;
font-weight:900;
}

.online{
background:#0d235f;
padding:18px 25px;
border-radius:20px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-bottom:40px;
}

.stat{
background:#0d235f;
padding:35px;
border-radius:30px;
}

.stat h1{
font-size:60px;
color:#4da3ff;
margin-bottom:10px;
}

.stat p{
font-size:22px;
}

/* CONTENT */

.content{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* BOX */

.box{
background:#0d235f;
padding:30px;
border-radius:30px;
}

.box h2{
font-size:35px;
margin-bottom:30px;
}

/* USERS */

.user{
background:#10296b;
padding:20px;
border-radius:20px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user-buttons{
display:flex;
gap:10px;
}

.user-buttons button{
padding:12px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:bold;
color:white;
}

.approve{
background:#00b85b;
}

.delete{
background:#ff3434;
}

/* APPLICATIONS */

.application{
background:#10296b;
padding:22px;
border-radius:20px;
margin-bottom:18px;
}

.application-buttons{
display:flex;
gap:12px;
margin-top:15px;
}

/* NEWS */

.news-form{
display:flex;
flex-direction:column;
gap:18px;
}

.news-form input,
.news-form textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#10296b;
color:white;
font-size:18px;
outline:none;
}

.news-form textarea{
height:180px;
resize:none;
}

.news-form button{
padding:18px;
border:none;
border-radius:18px;
background:#2f6dff;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.news-form button:hover{
background:#4f84ff;
}

.preview{
width:100%;
border-radius:20px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<img src="logo.png">

<h1>
ADMIN PANEL
</h1>

<p>
Введите пароль администратора
</p>

<input
type="password"
id="adminPassword"
placeholder="Пароль"
>

<button id="loginBtn">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div id="adminPanel">

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">

<img src="logo.png">

<h1>
Ultra<br>
Admin
</h1>

</div>

<div class="menu">

<button onclick="location.href='index.html'">
🏠 Главная
</button>

<button onclick="location.href='news.html'">
📰 Новости
</button>

<button onclick="location.href='profile.html'">
👤 Профиль
</button>

<button onclick="location.href='apply.html'">
📄 Заявления
</button>

<button onclick="location.href='leaders.html'">
👑 Руководство
</button>

</div>

</div>

<button class="logout" id="logoutBtn">
🚪 Выйти
</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
ADMIN PANEL
</h1>

<div class="online">
🟢 Администратор онлайн
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">
<h1 id="usersCount">0</h1>
<p>Пользователей</p>
</div>

<div class="stat">
<h1 id="appsCount">0</h1>
<p>Заявлений</p>
</div>

<div class="stat">
<h1 id="newsCount">0</h1>
<p>Новостей</p>
</div>

<div class="stat">
<h1>100%</h1>
<p>Система</p>
</div>

</div>

<!-- CONTENT -->

<div class="content">

<!-- USERS -->

<div class="box">

<h2>
Пользователи
</h2>

<div id="usersList"></div>

</div>

<!-- NEWS -->

<div class="box">

<h2>
Публикация новостей
</h2>

<form class="news-form" id="newsForm">

<input
type="text"
id="newsTitle"
placeholder="Название новости"
required
>

<textarea
id="newsText"
placeholder="Текст новости"
required
></textarea>

<input
type="file"
id="newsImage"
accept="image/*"
>

<img
id="preview"
class="preview"
>

<button type="submit">
Опубликовать новость
</button>

</form>

</div>

<!-- APPLICATIONS -->

<div class="box">

<h2>
Заявления
</h2>

<div id="applicationsList"></div>

</div>

</div>

</div>

</div>

<script type="module">

import {
auth,
db,
collection,
getDocs,
addDoc,
deleteDoc,
doc
}
from './firebase.js';

import {
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* PASSWORD */

const ADMIN_PASSWORD =
"1234567890mtrp9";

/* LOGIN */

document.getElementById(
"loginBtn"
).addEventListener(
"click",
()=>{

const password =
document.getElementById(
"adminPassword"
).value;

if(password === ADMIN_PASSWORD){

document.getElementById(
"loginScreen"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

}else{

alert("Неверный пароль");

}

});

/* COUNTS */

const users =
await getDocs(collection(db,"users"));

document.getElementById(
"usersCount"
).innerText =
users.size;

const apps =
await getDocs(collection(db,"applications"));

document.getElementById(
"appsCount"
).innerText =
apps.size;

const news =
await getDocs(collection(db,"news"));

document.getElementById(
"newsCount"
).innerText =
news.size;

/* USERS */

const usersList =
document.getElementById(
"usersList"
);

users.forEach((user)=>{

const data =
user.data();

usersList.innerHTML += `

<div class="user">

<div>
<h3>${data.email || "Пользователь"}</h3>
<p>ID: ${user.id}</p>
</div>

<div class="user-buttons">

<button class="approve">
Онлайн
</button>

<button class="delete">
Удалить
</button>

</div>

</div>

`;

});

/* APPLICATIONS */

const appsList =
document.getElementById(
"applicationsList"
);

apps.forEach((app)=>{

const data =
app.data();

appsList.innerHTML += `

<div class="application">

<h3>
${data.fullname}
</h3>

<p>
Discord: ${data.discord}
</p>

<p>
${data.why}
</p>

<div class="application-buttons">

<button class="approve">
Одобрить
</button>

<button class="delete">
Удалить
</button>

</div>

</div>

`;

});

/* IMAGE PREVIEW */

let imageBase64 = "";

document.getElementById(
"newsImage"
).addEventListener(
"change",
(e)=>{

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

imageBase64 =
event.target.result;

const preview =
document.getElementById(
"preview"
);

preview.src =
imageBase64;

preview.style.display =
"block";

};

reader.readAsDataURL(file);

});

/* NEWS */

document.getElementById(
"newsForm"
).addEventListener(
"submit",
async(e)=>{

e.preventDefault();

await addDoc(
collection(db,"news"),
{

title:
document.getElementById(
"newsTitle"
).value,

text:
document.getElementById(
"newsText"
).value,

image:
imageBase64,

created:
new Date()

}
);

alert(
"Новость опубликована"
);

location.reload();

});

/* LOGOUT */

document.getElementById(
"logoutBtn"
).addEventListener(
"click",
async()=>{

await signOut(auth);

location.reload();

});

</script>

</body>
</html>
