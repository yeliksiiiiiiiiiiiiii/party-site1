<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Админ панель</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f7ff;
}

header{
background:linear-gradient(135deg,#0039a6,#001b5e);
color:white;
padding:60px 20px;
text-align:center;
}

header h1{
font-size:54px;
}

nav{
background:white;
padding:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

nav a{
text-decoration:none;
color:#0039a6;
margin:0 18px;
font-weight:bold;
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.login-box,
.admin-panel{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.admin-panel{
display:none;
margin-top:20px;
}

.section{
margin-top:50px;
}

.section h2{
color:#0039a6;
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:2px solid #dbe4ff;
font-size:16px;
}

textarea{
min-height:150px;
resize:vertical;
}

button{
width:100%;
padding:16px;
background:#0039a6;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#d52b1e;
}

.application,
.news-preview{
background:#f4f7ff;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

.news-preview img{
width:100%;
border-radius:15px;
margin-top:15px;
}

.delete-btn{
background:#d52b1e;
margin-top:15px;
}

footer{
background:#0039a6;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<h1>Админ панель</h1>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>

</nav>

<div class="container">

<div class="login-box" id="loginBox">

<h2>Вход администратора</h2>

<br>

<input
type="text"
id="login"
placeholder="Логин">

<input
type="password"
id="password"
placeholder="Пароль">

<button onclick="loginAdmin()">
Войти
</button>

</div>

<div class="admin-panel" id="adminPanel">

<div class="section">

<h2>Проверка заявок</h2>

<div id="applications"></div>

</div>

<div class="section">

<h2>Публикация новостей</h2>

<input
type="text"
id="newsTitle"
placeholder="Заголовок">

<textarea
id="newsText"
placeholder="Текст новости"></textarea>

<input
type="text"
id="newsImage"
placeholder="Ссылка на изображение">

<button onclick="publishNews()">
Опубликовать новость
</button>

</div>

<div class="section">

<h2>Опубликованные новости</h2>

<div id="newsList"></div>

</div>

</div>

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

function loginAdmin(){

let login =
document.getElementById(
"login"
).value;

let password =
document.getElementById(
"password"
).value;

if(
login === "Admin" &&
password === "1234567890mtrp9"
){

document.getElementById(
"loginBox"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

loadApplications();
loadNews();

}else{

alert(
"Неверный логин или пароль"
);

}

}

function loadApplications(){

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

let container =
document.getElementById(
"applications"
);

container.innerHTML = "";

if(applications.length === 0){

container.innerHTML =
"<p>Заявок пока нет.</p>";

return;

}

applications.reverse().forEach((app,index)=>{

container.innerHTML += `

<div class="application">

<h3>Заявка #${index+1}</h3>

<p><b>ФИО:</b> ${app.fullname}</p>

<p><b>Возраст IC:</b> ${app.ageic}</p>

<p><b>Возраст OOC:</b> ${app.ageooc}</p>

<p><b>Discord:</b> ${app.discord}</p>

<p><b>Почему партия:</b> ${app.reason}</p>

<p><b>Поддержка:</b> ${app.support}</p>

</div>

`;

});

}

function publishNews(){

let title =
document.getElementById(
"newsTitle"
).value;

let text =
document.getElementById(
"newsText"
).value;

let image =
document.getElementById(
"newsImage"
).value;

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

news.push({

title:title,
text:text,
image:image,
date:new Date().toLocaleString()

});

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

alert(
"Новость опубликована"
);

loadNews();

}

function deleteNews(index){

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

news.splice(index,1);

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

loadNews();

}

function loadNews(){

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

let container =
document.getElementById(
"newsList"
);

container.innerHTML = "";

news.reverse().forEach((item,index)=>{

container.innerHTML += `

<div class="news-preview">

<h3>${item.title}</h3>

<p>${item.text}</p>

<img src="${item.image}">

<p>
<b>Дата:</b>
${item.date}
</p>

<button
class="delete-btn"
onclick="deleteNews(${news.length - 1 - index})">

Удалить новость

</button>

</div>

`;

});

}

</script>

</body>
</html>
