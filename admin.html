<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Админ панель</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2ff;
}

header{
background:linear-gradient(135deg,#0039a6,#00246b);
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
font-size:50px;
margin:0;
}

nav{
background:#00246b;
padding:18px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.login-box,
.admin-panel{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.admin-panel{
display:none;
margin-top:20px;
}

.section{
margin-top:50px;
}

.section-title{
font-size:32px;
color:#0039a6;
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:2px solid #ccd8ff;
font-size:16px;
box-sizing:border-box;
}

textarea{
min-height:150px;
resize:vertical;
}

button{
width:100%;
padding:16px;
background:#0039a6;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#d52b1e;
}

.application{
background:#eef3ff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.news-preview{
background:#eef3ff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.news-preview img{
width:100%;
border-radius:15px;
margin-top:15px;
max-height:400px;
object-fit:cover;
}

.delete-btn{
background:#d52b1e;
margin-top:15px;
}

footer{
background:#0039a6;
color:white;
text-align:center;
padding:25px;
margin-top:50px;
}

</style>
</head>

<body>

<header>

<h1>Админ панель партии</h1>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>

</nav>

<div class="container">

<div class="login-box" id="loginBox">

<h2>Вход администратора</h2>

<br>

<input
type="text"
id="login"
placeholder="Логин">

<input
type="password"
id="password"
placeholder="Пароль">

<button onclick="loginAdmin()">
Войти
</button>

</div>

<div class="admin-panel" id="adminPanel">

<!-- ЗАЯВКИ -->

<div class="section">

<h2 class="section-title">
Проверка заявок
</h2>

<div id="applications"></div>

</div>

<!-- НОВОСТИ -->

<div class="section">

<h2 class="section-title">
Публикация новостей
</h2>

<input
type="text"
id="newsTitle"
placeholder="Заголовок новости">

<textarea
id="newsText"
placeholder="Текст новости"></textarea>

<input
type="text"
id="newsImage"
placeholder="Ссылка на изображение">

<button onclick="publishNews()">
Опубликовать новость
</button>

</div>

<!-- СПИСОК НОВОСТЕЙ -->

<div class="section">

<h2 class="section-title">
Опубликованные новости
</h2>

<div id="newsList"></div>

</div>

</div>

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

/* ВХОД */

function loginAdmin(){

let login =
document.getElementById(
"login"
).value;

let password =
document.getElementById(
"password"
).value;

if(
login === "Admin" &&
password === "1234567890mtrp9"
){

document.getElementById(
"loginBox"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

loadApplications();
loadNews();

}else{

alert(
"Неверный логин или пароль"
);

}

}

/* ЗАГРУЗКА ЗАЯВОК */

function loadApplications(){

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

let container =
document.getElementById(
"applications"
);

container.innerHTML = "";

if(applications.length === 0){

container.innerHTML =
"<p>Заявок пока нет.</p>";

return;

}

applications.reverse().forEach((app,index)=>{

container.innerHTML += `

<div class="application">

<h3>Заявка #${index + 1}</h3>

<p>
<b>ФИО:</b>
${app.fullname}
</p>

<p>
<b>Возраст IC:</b>
${app.ageic}
</p>

<p>
<b>Возраст OOC:</b>
${app.ageooc}
</p>

<p>
<b>Discord:</b>
${app.discord}
</p>

<p>
<b>Почему партия:</b>
${app.reason}
</p>

<p>
<b>Поддержка партии:</b>
${app.support}
</p>

</div>

`;

});

}

/* ПУБЛИКАЦИЯ НОВОСТИ */

function publishNews(){

let title =
document.getElementById(
"newsTitle"
).value;

let text =
document.getElementById(
"newsText"
).value;

let image =
document.getElementById(
"newsImage"
).value;

if(title === "" || text === ""){

alert(
"Заполните поля"
);

return;

}

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

news.push({

title:title,
text:text,
image:image,
date:new Date().toLocaleString()

});

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

alert(
"Новость опубликована"
);

document.getElementById(
"newsTitle"
).value = "";

document.getElementById(
"newsText"
).value = "";

document.getElementById(
"newsImage"
).value = "";

loadNews();

}

/* УДАЛЕНИЕ НОВОСТИ */

function deleteNews(index){

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

news.splice(index,1);

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

loadNews();

}

/* ЗАГРУЗКА НОВОСТЕЙ */

function loadNews(){

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

let container =
document.getElementById(
"newsList"
);

container.innerHTML = "";

if(news.length === 0){

container.innerHTML =
"<p>Новостей пока нет.</p>";

return;

}

news.reverse().forEach((item,index)=>{

container.innerHTML += `

<div class="news-preview">

<h3>${item.title}</h3>

<p>${item.text}</p>

<img src="${item.image}">

<p>
<b>Дата:</b>
${item.date}
</p>

<button
class="delete-btn"
onclick="deleteNews(${news.length - 1 - index})">

Удалить новость

</button>

</div>

`;

});

}

</script>

</body>
</html>
