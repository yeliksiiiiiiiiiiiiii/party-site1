<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ Панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07153b;
color:white;
}

/* LOGIN */

.login{

position:fixed;
top:0;
left:0;

width:100%;
height:100vh;

background:#07153b;

display:flex;
justify-content:center;
align-items:center;

}

.login-box{

background:#0d235f;

padding:50px;

border-radius:30px;

width:420px;

text-align:center;

}

.login-box h1{

font-size:42px;

margin-bottom:30px;

}

.login-box input{

width:100%;

padding:18px;

border:none;

border-radius:15px;

margin-bottom:20px;

font-size:18px;

}

.login-box button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

/* PANEL */

.panel{

display:none;

}

/* HEADER */

header{

background:#0d235f;

padding:25px 50px;

display:flex;
justify-content:space-between;
align-items:center;

}

header h1{

font-size:40px;

}

/* PAGE */

.page{

width:95%;
max-width:1600px;

margin:50px auto;

}

/* CARD */

.card{

background:#0d235f;

padding:35px;

border-radius:30px;

margin-bottom:30px;

}

.card h2{

font-size:34px;

margin-bottom:25px;

}

input,
textarea{

width:100%;

padding:16px;

border:none;

border-radius:15px;

margin-bottom:20px;

font-size:17px;

}

textarea{

height:180px;
resize:none;

}

button{

padding:15px 25px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

.news{

background:#10296b;

padding:25px;

border-radius:25px;

margin-top:20px;

}

.delete{

background:#ef4444;

margin-top:15px;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<h1>
Вход
</h1>

<input
type="password"
id="password"
placeholder="Введите пароль"
>

<button onclick="login()">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

<header>

<h1>
Админ Панель
</h1>

<button onclick="logout()">
Выйти
</button>

</header>

<div class="page">

<!-- NEWS -->

<div class="card">

<h2>
Создать новость
</h2>

<input
type="text"
id="title"
placeholder="Заголовок"
>

<textarea
id="text"
placeholder="Текст новости"
></textarea>

<button onclick="addNews()">
Опубликовать
</button>

</div>

<!-- NEWS LIST -->

<div class="card">

<h2>
Все новости
</h2>

<div id="newsList"></div>

</div>

</div>

</div>

<script>

const PASSWORD =
"1234567890mtrp999";

/* LOGIN */

function login(){

const pass =
document.getElementById("password").value;

if(pass === PASSWORD){

localStorage.setItem(
"admin",
"true"
);

showPanel();

}else{

alert("Неверный пароль");

}

}

/* SHOW */

function showPanel(){

document.getElementById("login")
.style.display = "none";

document.getElementById("panel")
.style.display = "block";

loadNews();

}

/* AUTO LOGIN */

if(
localStorage.getItem("admin")
=== "true"
){

showPanel();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("admin");

location.reload();

}

/* ADD NEWS */

function addNews(){

const title =
document.getElementById("title").value;

const text =
document.getElementById("text").value;

if(!title || !text){

alert("Заполните поля");

return;

}

const news = {

id:Date.now(),

title:title,

text:text

};

let allNews =
JSON.parse(
localStorage.getItem("news")
) || [];

allNews.unshift(news);

localStorage.setItem(
"news",
JSON.stringify(allNews)
);

document.getElementById("title").value="";
document.getElementById("text").value="";

loadNews();

}

/* LOAD NEWS */

function loadNews(){

const list =
document.getElementById("newsList");

list.innerHTML = "";

let allNews =
JSON.parse(
localStorage.getItem("news")
) || [];

if(allNews.length === 0){

list.innerHTML =
"<p>Новостей нет</p>";

return;

}

allNews.forEach(news=>{

list.innerHTML += `

<div class="news">

<h3>
${news.title}
</h3>

<p>
${news.text}
</p>

<button
class="delete"
onclick="deleteNews(${news.id})"
>
Удалить
</button>

</div>

`;

});

}

/* DELETE */

function deleteNews(id){

let allNews =
JSON.parse(
localStorage.getItem("news")
) || [];

allNews =
allNews.filter(
n => n.id !== id
);

localStorage.setItem(
"news",
JSON.stringify(allNews)
);

loadNews();

}

</script>

</body>
</html>
