<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель проверок заявок</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6fb;
}

header{
    background:#0039a6;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.login-box,
.admin-panel{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.admin-panel{
    display:none;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    border:2px solid #ccd8ff;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#0039a6;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#d52b1e;
}

.application{
    background:#eef3ff;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.application h3{
    color:#0039a6;
}

</style>
</head>

<body>

<header>
    <h1>Панель проверки заявок</h1>
</header>

<div class="container">

    <!-- АВТОРИЗАЦИЯ -->

    <div class="login-box" id="loginBox">

        <h2>Вход администратора</h2>

        <input type="text" id="login" placeholder="Логин">

        <input type="password" id="password" placeholder="Пароль">

        <button onclick="loginAdmin()">
            Войти
        </button>

    </div>

    <!-- ПАНЕЛЬ -->

    <div class="admin-panel" id="adminPanel">

        <h2>Список заявок</h2>

        <div id="applications"></div>

    </div>

</div>

<script>

function loginAdmin(){

    let login = document.getElementById("login").value;
    let password = document.getElementById("password").value;

    if(login === "Admin" && password === "1234567890mtrp9"){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";

        loadApplications();

    }else{

        alert("Неверный логин или пароль");

    }

}

function loadApplications(){

    let applications = JSON.parse(localStorage.getItem("partyApplications")) || [];

    let container = document.getElementById("applications");

    container.innerHTML = "";

    if(applications.length === 0){

        container.innerHTML = "<p>Заявок пока нет.</p>";
        return;

    }

    applications.forEach((app,index)=>{

        container.innerHTML += `
        
        <div class="application">

            <h3>Заявка #${index + 1}</h3>

            <p><strong>ФИО:</strong> ${app.fullname}</p>

            <p><strong>Возраст IC:</strong> ${app.ageic}</p>

            <p><strong>Возраст OOC:</strong> ${app.ageooc}</p>

            <p><strong>Почему партия:</strong> ${app.reason}</p>

            <p><strong>Поддержка партии:</strong> ${app.support}</p>

        </div>

        `;

    });

}

</script>

</body>
</html>
