<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ Панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#06153a;
color:white;
}

/* HEADER */

header{
width:100%;
height:90px;
background:#071c52;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 50px;
position:fixed;
top:0;
left:0;
z-index:999;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
height:60px;
object-fit:cover;
background:white;
padding:5px;
border-radius:12px;
}

.logo h1{
font-size:30px;
line-height:1.1;
}

nav{
display:flex;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#4da3ff;
}

/* LOGIN */

.login-box{
width:500px;
background:white;
color:black;
padding:50px;
border-radius:30px;
margin:180px auto;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.login-box h1{
font-size:45px;
margin-bottom:30px;
text-align:center;
}

.login-box input{
width:100%;
padding:18px;
font-size:20px;
border-radius:15px;
border:none;
background:#dfe7f5;
margin-bottom:20px;
}

.login-box button{
width:100%;
padding:18px;
font-size:22px;
background:#1b4ed8;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.login-box button:hover{
background:#2563eb;
}

/* ADMIN */

.admin-panel{
display:none;
padding-top:130px;
width:95%;
max-width:1600px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:30px;
}

.card{
background:#0d235f;
padding:30px;
border-radius:30px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card h2{
font-size:34px;
margin-bottom:25px;
color:#4da3ff;
}

.item{
background:#10296b;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

.item h3{
font-size:22px;
margin-bottom:10px;
}

.item p{
font-size:17px;
margin-top:5px;
color:#dbeafe;
}

textarea,
input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
font-size:17px;
}

textarea{
height:150px;
resize:none;
}

.publish-btn{
width:100%;
padding:18px;
background:#2563eb;
border:none;
border-radius:15px;
font-size:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

.publish-btn:hover{
background:#3b82f6;
}

.news-image{
width:100%;
border-radius:15px;
margin-top:15px;
}

.delete-btn{
margin-top:15px;
padding:12px 18px;
background:#dc2626;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}

.delete-btn:hover{
background:#ef4444;
}

@media(max-width:1200px){

.grid{
grid-template-columns:1fr;
}

nav{
display:none;
}

.logo h1{
font-size:22px;
}

.login-box{
width:90%;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<h1>
Либеральная<br>
Партия России
</h1>

</div>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="profile.html">Профиль</a>
<a href="program.html">Программа</a>
<a href="ustav.html">Устав</a>
<a href="gimn.html">Гимн</a>

</nav>

</header>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<h1>
Вход в Админ Панель
</h1>

<input
type="password"
id="adminPassword"
placeholder="Введите пароль"
>

<button id="loginBtn">
Войти
</button>

</div>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">

<div class="grid">

<!-- USERS -->

<div class="card">

<h2>
Пользователи
</h2>

<div id="usersList"></div>

</div>

<!-- APPLICATIONS -->

<div class="card">

<h2>
Заявления
</h2>

<div id="applicationsList"></div>

</div>

<!-- NEWS -->

<div class="card">

<h2>
Публикация новостей
</h2>

<input
type="text"
id="newsTitle"
placeholder="Название новости"
>

<input
type="text"
id="newsImage"
placeholder="Ссылка на фото"
>

<textarea
id="newsText"
placeholder="Текст новости"
></textarea>

<button
class="publish-btn"
id="publishBtn"
>
Опубликовать
</button>

</div>

</div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from './firebase.js';

/* PASSWORD */

const password =
"1234567890mtrp9";

document
.getElementById("loginBtn")
.addEventListener("click",()=>{

const input =
document.getElementById("adminPassword").value;

if(input === password){

document.getElementById("loginBox").style.display =
"none";

document.getElementById("adminPanel").style.display =
"block";

loadUsers();
loadApplications();

}else{

alert("Неверный пароль");

}

});

/* USERS */

async function loadUsers(){

const container =
document.getElementById("usersList");

container.innerHTML = "";

const snapshot =
await getDocs(collection(db,"users"));

snapshot.forEach((docSnap)=>{

const user =
docSnap.data();

container.innerHTML += `

<div class="item">

<h3>${user.email}</h3>

<p>
Роль: ${user.role}
</p>

<p>
Дата регистрации:
${user.created}
</p>

</div>

`;

});

}

/* APPLICATIONS */

async function loadApplications(){

const container =
document.getElementById("applicationsList");

container.innerHTML = "";

const snapshot =
await getDocs(collection(db,"applications"));

snapshot.forEach((docSnap)=>{

const app =
docSnap.data();

container.innerHTML += `

<div class="item">

<h3>
${app.fullname}
</h3>

<p>
Discord:
${app.discord}
</p>

<p>
IC возраст:
${app.icage}
</p>

<p>
OOC возраст:
${app.oocage}
</p>

<p>
Почему:
${app.why}
</p>

<button
class="delete-btn"
onclick="deleteApplication('${docSnap.id}')"
>
Удалить
</button>

</div>

`;

});

}

/* DELETE */

window.deleteApplication =
async(id)=>{

await deleteDoc(
doc(db,"applications",id)
);

loadApplications();

};

/* NEWS */

document
.getElementById("publishBtn")
.addEventListener("click",async()=>{

const title =
document.getElementById("newsTitle").value;

const image =
document.getElementById("newsImage").value;

const text =
document.getElementById("newsText").value;

if(!title || !text){

alert("Заполните поля");
return;

}

await addDoc(
collection(db,"news"),
{

title:title,
image:image,
text:text,
date:new Date().toLocaleString("ru-RU")

}
);

alert("Новость опубликована");

document.getElementById("newsTitle").value = "";
document.getElementById("newsImage").value = "";
document.getElementById("newsText").value = "";

};

</script>

</body>
</html>
