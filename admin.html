<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Админ панель</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2ff;
}

header{
background:#0039a6;
color:white;
text-align:center;
padding:35px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.login-box,
.admin-panel{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.admin-panel{
display:none;
margin-top:20px;
}

input,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:12px;
border:2px solid #ccd8ff;
box-sizing:border-box;
}

textarea{
min-height:150px;
}

button{
width:100%;
padding:15px;
background:#0039a6;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.application,
.news-preview{
background:#eef3ff;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.news-preview img{
width:100%;
border-radius:15px;
margin-top:15px;
}

.delete-btn{
background:#d52b1e;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>Админ панель партии</h1>

</header>

<div class="container">

<div class="login-box" id="loginBox">

<h2>Вход администратора</h2>

<input type="text"
id="login"
placeholder="Логин">

<input type="password"
id="password"
placeholder="Пароль">

<button onclick="loginAdmin()">
Войти
</button>

</div>

<div class="admin-panel" id="adminPanel">

<h2>Создать новость</h2>

<input type="text"
id="newsTitle"
placeholder="Заголовок">

<textarea
id="newsText"
placeholder="Текст новости"></textarea>

<input type="text"
id="newsImage"
placeholder="Ссылка на фото">

<button onclick="publishNews()">
Опубликовать
</button>

<h2>Новости</h2>

<div id="newsList"></div>

</div>

</div>

<script>

function loginAdmin(){

let login =
document.getElementById("login").value;

let password =
document.getElementById("password").value;

if(
login === "Admin" &&
password === "1234567890mtrp9"
){

document.getElementById(
"loginBox"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

loadNews();

}else{

alert("Неверный логин или пароль");

}

}

function publishNews(){

let title =
document.getElementById("newsTitle").value;

let text =
document.getElementById("newsText").value;

let image =
document.getElementById("newsImage").value;

if(title === "" || text === ""){

alert("Заполните поля");

return;

}

let news =
JSON.parse(localStorage.getItem("partyNews")) || [];

news.push({

title:title,
text:text,
image:image,
date:new Date().toLocaleString()

});

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

alert("Новость опубликована");

document.getElementById("newsTitle").value = "";
document.getElementById("newsText").value = "";
document.getElementById("newsImage").value = "";

loadNews();

}

function deleteNews(index){

let news =
JSON.parse(localStorage.getItem("partyNews")) || [];

news.splice(index,1);

localStorage.setItem(
"partyNews",
JSON.stringify(news)
);

loadNews();

}

function loadNews(){

let news =
JSON.parse(localStorage.getItem("partyNews")) || [];

let container =
document.getElementById("newsList");

container.innerHTML = "";

if(news.length === 0){

container.innerHTML =
"<p>Новостей пока нет.</p>";

return;

}

news.reverse().forEach((item,index)=>{

container.innerHTML += `

<div class="news-preview">

<h3>${item.title}</h3>

<p>${item.text}</p>

<img src="${item.image}">

<button
class="delete-btn"
onclick="deleteNews(${news.length - 1 - index})">
Удалить
</button>

</div>

`;

});

}

</script>

</body>
</html>
