<!-- НОВЫЙ ДИЗАЙН ADMIN.HTML -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ Панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
color:#111;
}

/* HEADER */

header{

position:fixed;
top:0;
left:0;

width:100%;

background:#0b2d82;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 50px;

z-index:999;

box-shadow:0 2px 20px rgba(0,0,0,0.2);

}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
}

.logo h1{
color:white;
font-size:34px;
line-height:1.1;
}

/* NAV */

nav{
display:flex;
gap:15px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:12px 18px;
border-radius:12px;
transition:0.3s;
}

nav a:hover{
background:rgba(255,255,255,0.15);
}

/* MAIN */

.container{
width:92%;
max-width:1500px;
margin:160px auto 50px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

/* CARD */

.card{

background:white;

border-radius:30px;

padding:35px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

}

/* TITLES */

.card h2{
font-size:35px;
margin-bottom:25px;
color:#0b2d82;
}

/* USERS */

.user{

background:#edf3ff;

padding:20px;

border-radius:18px;

margin-bottom:15px;

}

.user h3{
margin-bottom:10px;
}

/* APPLICATION */

.app{

background:#edf3ff;

padding:20px;

border-radius:18px;

margin-bottom:20px;

}

.app h3{
margin-bottom:10px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

button{

border:none;

padding:14px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.approve{
background:#0b9d49;
color:white;
}

.delete{
background:#ff2d2d;
color:white;
}

.admin{
background:#0b2d82;
color:white;
}

.publish{
background:#0051ff;
color:white;
width:100%;
font-size:18px;
}

button:hover{
transform:scale(1.03);
}

/* INPUT */

input,
textarea{

width:100%;

padding:16px;

border:none;

background:#edf3ff;

border-radius:16px;

margin-bottom:20px;

font-size:16px;

}

textarea{
height:180px;
resize:none;
}

/* EMPTY */

.empty{
padding:30px;
text-align:center;
font-size:22px;
opacity:0.7;
}

/* PASSWORD */

#newsPanel{
display:none;
}

/* MOBILE */

@media(max-width:900px){

header{
flex-direction:column;
gap:20px;
padding:25px;
}

.logo{
flex-direction:column;
text-align:center;
}

nav{
justify-content:center;
}

.container{
margin-top:220px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">

<img src="logo.png">

<h1>

Либеральная
<br>
Партия России

</h1>

</div>

<nav>

<a href="index.html">
Главная
</a>

<a href="news.html">
Новости
</a>

<a href="leaders.html">
Руководство
</a>

<a href="ustav.html">
Устав
</a>

<a href="gimn.html">
Гимн
</a>

<a href="program.html">
Программа
</a>

</nav>

</header>

<!-- MAIN -->

<div class="container">

<div class="grid">

<!-- USERS -->

<div class="card">

<h2>
Пользователи
</h2>

<div id="usersList">

<div class="empty">
Загрузка...
</div>

</div>

</div>

<!-- APPLICATIONS -->

<div class="card">

<h2>
Заявления
</h2>

<div id="applicationsList">

<div class="empty">
Загрузка...
</div>

</div>

</div>

<!-- NEWS -->

<div class="card">

<h2>
Публикация новостей
</h2>

<div id="loginBox">

<input
type="password"
id="password"
placeholder="Введите пароль"
>

<button
class="publish"
onclick="checkPassword()"
>

Войти

</button>

</div>

<div id="newsPanel">

<input
type="text"
id="newsTitle"
placeholder="Название новости"
>

<input
type="text"
id="newsImage"
placeholder="Ссылка на фото"
>

<textarea
id="newsText"
placeholder="Текст новости"
></textarea>

<button
class="publish"
onclick="publishNews()"
>

Опубликовать новость

</button>

</div>

</div>

</div>

</div>

<script type="module">

import {

db,

collection,
getDocs,
addDoc,
deleteDoc,
doc,
updateDoc

}

from './firebase.js';

/* USERS */

const usersContainer =
document.getElementById(
"usersList"
);

async function loadUsers(){

usersContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"users")
);

if(querySnapshot.empty){

usersContainer.innerHTML = `
<div class="empty">
Пользователей нет
</div>
`;

return;

}

querySnapshot.forEach((documentData)=>{

const user =
documentData.data();

usersContainer.innerHTML += `

<div class="user">

<h3>
${user.email || "Без email"}
</h3>

<p>
Роль:
${user.role || "user"}
</p>

<div class="buttons">

<button
class="admin"
onclick="makeAdmin('${documentData.id}')"
>

Выдать Admin

</button>

</div>

</div>

`;

});

}

window.makeAdmin =
async function(id){

await updateDoc(
doc(db,"users",id),
{
role:"admin"
}
);

loadUsers();

}

/* APPLICATIONS */

const appsContainer =
document.getElementById(
"applicationsList"
);

async function loadApps(){

appsContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"applications")
);

if(querySnapshot.empty){

appsContainer.innerHTML = `
<div class="empty">
Заявлений нет
</div>
`;

return;

}

querySnapshot.forEach((documentData)=>{

const app =
documentData.data();

appsContainer.innerHTML += `

<div class="app">

<h3>
${app.fullname || "Без имени"}
</h3>

<p>
Discord:
${app.discord || ""}
</p>

<p>
IC:
${app.icage || ""}
</p>

<p>
OOC:
${app.oocage || ""}
</p>

<p>
${app.why || ""}
</p>

<div class="buttons">

<button
class="approve"
onclick="approveApp('${documentData.id}')"
>

Одобрить

</button>

<button
class="delete"
onclick="deleteApp('${documentData.id}')"
>

Удалить

</button>

</div>

</div>

`;

});

}

window.approveApp =
async function(id){

await updateDoc(
doc(db,"applications",id),
{
status:"approved"
}
);

loadApps();

}

window.deleteApp =
async function(id){

await deleteDoc(
doc(db,"applications",id)
);

loadApps();

}

/* PASSWORD */

window.checkPassword =
function(){

const password =
document.getElementById(
"password"
).value;

if(
password ===
"1234567890mtrp9"
){

document.getElementById(
"loginBox"
).style.display =
"none";

document.getElementById(
"newsPanel"
).style.display =
"block";

}else{

alert(
"Неверный пароль"
);

}

}

/* NEWS */

window.publishNews =
async function(){

const title =
document.getElementById(
"newsTitle"
).value;

const image =
document.getElementById(
"newsImage"
).value;

const text =
document.getElementById(
"newsText"
).value;

if(
title=="" ||
text==""
){

alert(
"Заполните поля"
);

return;

}

await addDoc(
collection(db,"news"),
{

title:title,
image:image,
text:text,

date:
new Date().toLocaleString()

}
);

alert(
"Новость опубликована"
);

document.getElementById(
"newsTitle"
).value = "";

document.getElementById(
"newsImage"
).value = "";

document.getElementById(
"newsText"
).value = "";

}

/* START */

loadUsers();
loadApps();

</script>

</body>
</html>
