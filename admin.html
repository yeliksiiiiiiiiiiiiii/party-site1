<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(rgba(0,20,70,0.85),rgba(0,20,70,0.85)),
url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
min-height:100vh;
color:white;
}

/* LOGIN */

.login-page{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.login-box{
width:600px;
background:#0b1f63;
padding:50px;
border-radius:35px;
box-shadow:0 0 50px rgba(0,0,0,0.5);
text-align:center;
}

.login-logo{
width:130px;
height:130px;
background:white;
padding:15px;
border-radius:25px;
object-fit:contain;
margin-bottom:30px;
}

.login-box h1{
font-size:70px;
font-weight:900;
margin-bottom:15px;
}

.login-box p{
font-size:24px;
color:#8ebcff;
margin-bottom:35px;
}

.login-box input{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:#17348d;
font-size:22px;
color:white;
margin-bottom:25px;
outline:none;
}

.login-box button{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:#4c7cff;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
transform:translateY(-4px);
background:#6a92ff;
}

/* PANEL */

.admin-panel{
display:none;
padding:40px;
}

.topbar{
background:#0b1f63;
padding:30px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.topbar h1{
font-size:42px;
}

.logout{
background:red;
padding:15px 30px;
border:none;
border-radius:14px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

.card{
background:#0b1f63;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.card h2{
font-size:34px;
margin-bottom:25px;
color:#77a7ff;
}

.card input,
.card textarea{
width:100%;
padding:18px;
border:none;
border-radius:14px;
margin-bottom:18px;
font-size:18px;
background:#17348d;
color:white;
outline:none;
}

.card textarea{
height:200px;
resize:none;
}

.card button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#4c7cff;
font-size:20px;
font-weight:bold;
color:white;
cursor:pointer;
}

.card button:hover{
background:#6a92ff;
}

.news-list{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.news-item{
background:#17348d;
padding:18px;
border-radius:16px;
}

.news-item img{
width:100%;
border-radius:16px;
margin-top:12px;
}

.users{
display:flex;
flex-direction:column;
gap:15px;
}

.user{
background:#17348d;
padding:18px;
border-radius:16px;
font-size:18px;
}

@media(max-width:800px){

.login-box h1{
font-size:45px;
}

.topbar{
flex-direction:column;
gap:20px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login-page">

<div class="login-box">

<img
src="logo.png"
class="login-logo"
>

<h1>
ADMIN PANEL
</h1>

<p>
Введите пароль администратора
</p>

<input
type="password"
id="password"
placeholder="Введите пароль"
>

<button id="loginBtn">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div class="admin-panel">

<div class="topbar">

<h1>
Панель управления
</h1>

<button class="logout" id="logoutBtn">
Выйти
</button>

</div>

<div class="grid">

<!-- USERS -->

<div class="card">

<h2>
Пользователи
</h2>

<div class="users" id="usersList">

<div class="user">
Загрузка...
</div>

</div>

</div>

<!-- NEWS -->

<div class="card">

<h2>
Публикация новости
</h2>

<input
type="text"
id="newsTitle"
placeholder="Заголовок"
>

<input
type="text"
id="newsImage"
placeholder="Ссылка на фото"
>

<textarea
id="newsText"
placeholder="Текст новости"
></textarea>

<button id="publishBtn">
Опубликовать
</button>

</div>

<!-- NEWS LIST -->

<div class="card">

<h2>
Последние новости
</h2>

<div class="news-list" id="newsList">

</div>

</div>

</div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs
}
from './firebase.js';

/* PASSWORD */

const ADMIN_PASSWORD =
"1234567890mtrp9";

document
.getElementById("loginBtn")
.addEventListener("click",()=>{

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document.querySelector(".login-page").style.display =
"none";

document.querySelector(".admin-panel").style.display =
"block";

loadUsers();
loadNews();

}else{

alert("Неверный пароль");

}

});

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener("click",()=>{

location.reload();

});

/* LOAD USERS */

async function loadUsers(){

const usersList =
document.getElementById("usersList");

usersList.innerHTML = "";

const snap =
await getDocs(collection(db,"users"));

snap.forEach(doc=>{

const data = doc.data();

usersList.innerHTML += `

<div class="user">

<b>Email:</b> ${data.email}<br><br>

<b>Роль:</b> ${data.role}<br><br>

<b>Дата:</b> ${data.created}

</div>

`;

});

}

/* PUBLISH NEWS */

document
.getElementById("publishBtn")
.addEventListener("click",async()=>{

const title =
document.getElementById("newsTitle").value;

const text =
document.getElementById("newsText").value;

const image =
document.getElementById("newsImage").value;

if(!title || !text){

alert("Заполните поля");
return;

}

await addDoc(collection(db,"news"),{

title,
text,
image,

date:new Date().toLocaleString("ru-RU")

});

alert("Новость опубликована");

document.getElementById("newsTitle").value="";
document.getElementById("newsText").value="";
document.getElementById("newsImage").value="";

loadNews();

});

/* LOAD NEWS */

async function loadNews(){

const newsList =
document.getElementById("newsList");

newsList.innerHTML = "";

const snap =
await getDocs(collection(db,"news"));

snap.forEach(doc=>{

const data = doc.data();

newsList.innerHTML += `

<div class="news-item">

<h3>${data.title}</h3>

<p style="margin-top:10px;">
${data.text}
</p>

${
data.image
?
`<img src="${data.image}">`
:
""
}

<p style="margin-top:10px;color:#8ebcff;">
${data.date}
</p>

</div>

`;

});

}

</script>

</body>
</html>
