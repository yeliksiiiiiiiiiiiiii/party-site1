<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Ultra Admin Panel
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#06153a;
color:white;
overflow-x:hidden;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:320px;
height:100vh;
background:#04113b;
position:fixed;
left:0;
top:0;
padding:35px;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 0 40px rgba(0,0,0,0.5);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:15px;
margin-bottom:50px;
}

.logo img{
width:70px;
height:70px;
background:white;
padding:6px;
border-radius:18px;
}

.logo h1{
font-size:28px;
font-weight:900;
line-height:1;
}

.menu{
display:flex;
flex-direction:column;
gap:18px;
}

.menu button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#0d235f;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
}

.menu button:hover{
background:#2f6dff;
transform:translateX(5px);
}

.logout{
background:#ff3434 !important;
}

.logout:hover{
background:#ff5555 !important;
}

/* MAIN */

.main{
margin-left:320px;
width:calc(100% - 320px);
padding:40px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.topbar h1{
font-size:55px;
font-weight:900;
}

.admin-info{
background:#0d235f;
padding:18px 25px;
border-radius:20px;
font-size:18px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-bottom:40px;
}

.stat{
background:#0d235f;
padding:35px;
border-radius:30px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.stat:hover{
transform:translateY(-6px);
background:#12307f;
}

.stat h1{
font-size:60px;
margin-bottom:10px;
color:#4da3ff;
}

.stat p{
font-size:22px;
}

/* CONTENT */

.content{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* BOX */

.box{
background:#0d235f;
padding:30px;
border-radius:30px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.box h2{
font-size:35px;
margin-bottom:30px;
}

/* USERS */

.user{
background:#10296b;
padding:20px;
border-radius:20px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user-info h3{
font-size:22px;
margin-bottom:5px;
}

.user-info p{
font-size:16px;
color:#9ecbff;
}

.user-buttons{
display:flex;
gap:10px;
}

.user-buttons button{
padding:12px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:bold;
color:white;
}

.approve{
background:#00b85b;
}

.delete{
background:#ff3434;
}

/* NEWS */

.news-form{
display:flex;
flex-direction:column;
gap:18px;
}

.news-form input,
.news-form textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#10296b;
color:white;
font-size:18px;
outline:none;
}

.news-form textarea{
height:180px;
resize:none;
}

.news-form button{
padding:18px;
border:none;
border-radius:18px;
background:#2f6dff;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.news-form button:hover{
background:#4f84ff;
}

/* APPLICATIONS */

.application{
background:#10296b;
padding:22px;
border-radius:20px;
margin-bottom:18px;
}

.application h3{
font-size:24px;
margin-bottom:10px;
}

.application p{
margin-bottom:10px;
line-height:1.5;
color:#d8e5ff;
}

.application-buttons{
display:flex;
gap:12px;
margin-top:15px;
}

/* MOBILE */

@media(max-width:1300px){

.content{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:900px){

.sidebar{
width:100px;
padding:20px;
}

.logo h1{
display:none;
}

.menu button{
font-size:0;
height:65px;
}

.main{
margin-left:100px;
width:calc(100% - 100px);
padding:20px;
}

.topbar h1{
font-size:35px;
}

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">

<img src="logo.png">

<h1>
Ultra<br>
Admin
</h1>

</div>

<div class="menu">

<button onclick="location.href='index.html'">
🏠 Главная
</button>

<button onclick="location.href='news.html'">
📰 Новости
</button>

<button onclick="location.href='profile.html'">
👤 Профиль
</button>

<button onclick="location.href='apply.html'">
📄 Заявления
</button>

<button onclick="location.href='leaders.html'">
👑 Руководство
</button>

</div>

</div>

<button class="logout" id="logoutBtn">
🚪 Выйти
</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
ADMIN PANEL
</h1>

<div class="admin-info">
🟢 Администратор онлайн
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">
<h1 id="usersCount">
0
</h1>
<p>Пользователей</p>
</div>

<div class="stat">
<h1 id="appsCount">
0
</h1>
<p>Заявлений</p>
</div>

<div class="stat">
<h1 id="newsCount">
0
</h1>
<p>Новостей</p>
</div>

<div class="stat">
<h1>
100%
</h1>
<p>Система</p>
</div>

</div>

<!-- CONTENT -->

<div class="content">

<!-- USERS -->

<div class="box">

<h2>
Пользователи
</h2>

<div id="usersList">

<div class="user">

<div class="user-info">
<h3>Загрузка...</h3>
<p>Получение данных</p>
</div>

</div>

</div>

</div>

<!-- NEWS -->

<div class="box">

<h2>
Публикация новостей
</h2>

<form class="news-form" id="newsForm">

<input
type="password"
id="adminPassword"
placeholder="Пароль администратора"
required
>

<input
type="text"
id="newsTitle"
placeholder="Заголовок новости"
required
>

<textarea
id="newsText"
placeholder="Текст новости"
required
></textarea>

<button type="submit">
Опубликовать новость
</button>

</form>

</div>

<!-- APPLICATIONS -->

<div class="box">

<h2>
Заявления
</h2>

<div id="applicationsList">

<div class="application">
<h3>Загрузка...</h3>
<p>Получение заявлений</p>
</div>

</div>

</div>

</div>

</div>

<script type="module">

import {
auth,
db,
collection,
getDocs,
addDoc,
deleteDoc,
doc
}
from './firebase.js';

import {
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* PASSWORD */

const ADMIN_PASSWORD =
"1234567890mtrp9";

/* COUNTS */

const users =
await getDocs(collection(db,"users"));

document.getElementById("usersCount").innerText =
users.size;

const apps =
await getDocs(collection(db,"applications"));

document.getElementById("appsCount").innerText =
apps.size;

const news =
await getDocs(collection(db,"news"));

document.getElementById("newsCount").innerText =
news.size;

/* USERS LIST */

const usersList =
document.getElementById("usersList");

usersList.innerHTML = "";

users.forEach((user)=>{

const data = user.data();

usersList.innerHTML += `

<div class="user">

<div class="user-info">
<h3>${data.email || "Пользователь"}</h3>
<p>ID: ${user.id}</p>
</div>

<div class="user-buttons">

<button class="approve">
Онлайн
</button>

<button
class="delete"
onclick="deleteUser('${user.id}')"
>
Удалить
</button>

</div>

</div>

`;

});

/* APPLICATIONS */

const appsList =
document.getElementById("applicationsList");

appsList.innerHTML = "";

apps.forEach((app)=>{

const data = app.data();

appsList.innerHTML += `

<div class="application">

<h3>
${data.fullname}
</h3>

<p>
Discord: ${data.discord}
</p>

<p>
IC возраст: ${data.icage}
</p>

<p>
${data.why}
</p>

<div class="application-buttons">

<button
class="approve"
onclick="approveApplication('${app.id}')"
>
Одобрить
</button>

<button
class="delete"
onclick="deleteApplication('${app.id}')"
>
Удалить
</button>

</div>

</div>

`;

});

/* NEWS */

document.getElementById("newsForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const password =
document.getElementById("adminPassword").value;

if(password !== ADMIN_PASSWORD){

alert("Неверный пароль");
return;

}

await addDoc(
collection(db,"news"),
{

title:
document.getElementById("newsTitle").value,

text:
document.getElementById("newsText").value,

created:
new Date()

}
);

alert("Новость опубликована");

location.reload();

});

/* DELETE APPLICATION */

window.deleteApplication =
async(id)=>{

await deleteDoc(doc(db,"applications",id));

location.reload();

};

/* APPROVE */

window.approveApplication =
async(id)=>{

alert("Заявление одобрено");

await deleteDoc(doc(db,"applications",id));

location.reload();

};

/* DELETE USER */

window.deleteUser =
async(id)=>{

alert("Пользователь удалён");

};

/* LOGOUT */

document.getElementById("logoutBtn")
.addEventListener("click",async()=>{

await signOut(auth);

window.location.href =
"login.html";

});

</script>

</body>
</html>
