<!-- admin.html -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ Панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#07153b;
color:white;

}

/* LOGIN */

.login-box{

position:fixed;
top:0;
left:0;

width:100%;
height:100vh;

background:#07153b;

display:flex;
justify-content:center;
align-items:center;

z-index:9999;

}

.login-card{

background:#0d235f;

padding:50px;

border-radius:30px;

width:420px;

text-align:center;

box-shadow:
0 0 40px rgba(0,0,0,0.4);

}

.login-card h1{

font-size:42px;

margin-bottom:30px;

}

.login-card input{

width:100%;

padding:18px;

border:none;

border-radius:15px;

margin-bottom:20px;

font-size:18px;

outline:none;

}

.login-card button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.login-card button:hover{

background:#3b82f6;

}

/* PANEL */

.admin-panel{

display:none;

}

/* HEADER */

header{

width:100%;
padding:25px 50px;

background:#0d235f;

display:flex;
justify-content:space-between;
align-items:center;

}

header h1{

font-size:38px;

}

.logout-btn{

padding:14px 25px;

background:#ef4444;

border:none;

border-radius:15px;

color:white;

font-weight:bold;

cursor:pointer;

}

/* PAGE */

.page{

width:95%;
max-width:1600px;

margin:50px auto;

}

/* CARDS */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(350px,1fr));

gap:30px;

}

/* CARD */

.card{

background:#0d235f;

padding:35px;

border-radius:30px;

box-shadow:
0 0 30px rgba(0,0,0,0.3);

}

.card h2{

font-size:32px;

margin-bottom:25px;

}

/* INPUTS */

input,
textarea{

width:100%;

padding:16px;

border:none;

border-radius:15px;

margin-bottom:18px;

font-size:17px;

outline:none;

}

textarea{

height:180px;
resize:none;

}

/* BUTTON */

button{

padding:16px 25px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#3b82f6;

}

/* NEWS LIST */

.news-list{

margin-top:30px;

display:flex;
flex-direction:column;
gap:20px;

}

.news-item{

background:#10296b;

padding:25px;

border-radius:25px;

position:relative;

}

.news-item img{

width:100%;
max-height:250px;

object-fit:cover;

border-radius:20px;

margin-top:15px;

}

.news-item h3{

font-size:28px;

margin-bottom:10px;

}

.news-item p{

font-size:18px;

line-height:1.7;

color:#dbeafe;

margin-top:10px;

}

.delete-btn{

margin-top:20px;

background:#ef4444;

}

.delete-btn:hover{

background:#ff5a5a;

}

/* MOBILE */

@media(max-width:800px){

header{

padding:20px;
flex-direction:column;
gap:20px;

}

header h1{

font-size:28px;

}

.login-card{

width:92%;

padding:35px;

}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<div class="login-card">

<h1>
Вход в Админ Панель
</h1>

<input
type="password"
id="password"
placeholder="Введите пароль"
>

<button onclick="login()">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div class="admin-panel" id="adminPanel">

<header>

<h1>
Админ Панель
</h1>

<button
class="logout-btn"
onclick="logout()"
>
Выйти
</button>

</header>

<div class="page">

<div class="grid">

<!-- NEWS CREATE -->

<div class="card">

<h2>
Создать новость
</h2>

<input
type="text"
id="title"
placeholder="Заголовок"
>

<textarea
id="text"
placeholder="Текст новости"
></textarea>

<input
type="file"
id="imageInput"
accept="image/*"
>

<button onclick="addNews()">
Опубликовать
</button>

</div>

<!-- NEWS LIST -->

<div class="card">

<h2>
Все новости
</h2>

<div
class="news-list"
id="newsList"
></div>

</div>

</div>

</div>

</div>

<script>

/* PASSWORD */

const ADMIN_PASSWORD =
"1234567890mtrp9";

/* LOGIN */

function login(){

const password =
document.getElementById("password").value;

if(password === ADMIN_PASSWORD){

localStorage.setItem(
"adminAccess",
"true"
);

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("adminPanel")
.style.display = "block";

loadNews();

}else{

alert("Неверный пароль");

}

}

/* AUTO LOGIN */

if(
localStorage.getItem("adminAccess")
=== "true"
){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("adminPanel")
.style.display = "block";

loadNews();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("adminAccess");

location.reload();

}

/* ADD NEWS */

function addNews(){

const title =
document.getElementById("title").value;

const text =
document.getElementById("text").value;

const imageInput =
document.getElementById("imageInput");

if(!title || !text){

alert("Заполните поля");

return;

}

const reader =
new FileReader();

reader.onload = function(e){

const image =
e.target.result;

const news = {

id:Date.now(),

title:title,

text:text,

image:image

};

let newsArray =
JSON.parse(
localStorage.getItem("news")
) || [];

newsArray.unshift(news);

localStorage.setItem(
"news",
JSON.stringify(newsArray)
);

document.getElementById("title").value = "";
document.getElementById("text").value = "";
document.getElementById("imageInput").value = "";

loadNews();

};

if(imageInput.files[0]){

reader.readAsDataURL(
imageInput.files[0]
);

}else{

reader.onload({
target:{
result:""
}
});

}

}

/* LOAD NEWS */

function loadNews(){

const newsList =
document.getElementById("newsList");

newsList.innerHTML = "";

let newsArray =
JSON.parse(
localStorage.getItem("news")
) || [];

if(newsArray.length === 0){

newsList.innerHTML =
"<p>Новостей пока нет</p>";

return;

}

newsArray.forEach(news=>{

newsList.innerHTML += `

<div class="news-item">

<h3>
${news.title}
</h3>

<p>
${news.text}
</p>

${
news.image
?
`<img src="${news.image}">`
:
""
}

<button
class="delete-btn"
onclick="deleteNews(${news.id})"
>
Удалить новость
</button>

</div>

`;

});

}

/* DELETE NEWS */

function deleteNews(id){

let newsArray =
JSON.parse(
localStorage.getItem("news")
) || [];

newsArray =
newsArray.filter(
news => news.id !== id
);

localStorage.setItem(
"news",
JSON.stringify(newsArray)
);

loadNews();

}

</script>

</body>
</html>
