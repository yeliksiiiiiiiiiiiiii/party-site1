<!-- ADMIN.HTML С ПОЛЬЗОВАТЕЛЯМИ -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Админ панель
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#071739;
color:white;
}

/* HEADER */

header{
background:#00154d;
padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px black;
}

/* NAVIGATION */

nav{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
background:#0b1d57;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
padding:12px 20px;
border-radius:12px;
background:#132b75;
transition:0.3s;
font-size:17px;
}

nav a:hover{
background:#0051ff;
transform:translateY(-3px);
}

/* CONTAINER */

.container{
width:90%;
max-width:1200px;
margin:40px auto;
}

/* TITLES */

.title{
font-size:32px;
margin-bottom:30px;
margin-top:50px;
}

/* CARD */

.card{
background:#0b1d57;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
animation:fade 0.3s;
}

.card h2{
margin-bottom:15px;
color:#4da3ff;
}

.card p{
margin-bottom:12px;
line-height:1.6;
}

/* BUTTONS */

.buttons{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.buttons button{
padding:14px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
font-weight:bold;
}

.approve{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}

.admin{
background:#0051ff;
color:white;
}

.buttons button:hover{
transform:scale(1.05);
}

/* EMPTY */

.empty{
text-align:center;
padding:60px;
font-size:25px;
opacity:0.7;
}

/* ANIMATION */

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<header>
Админ панель партии
</header>

<nav>

<a href="index.html">
Главная
</a>

<a href="news.html">
Новости
</a>

<a href="leaders.html">
Руководство
</a>

Заявление
</a>

<a href="chat.html">
Чат

<a href="program.html">
Программа
</a>

Устав
</a>

<a href="gimn.html">
Гимн
</a>

<a href="admin.html">
Админ панель
</a>

</nav>

<div class="container">

<!-- APPLICATIONS -->

<h1 class="title">
Проверка заявлений
</h1>

<div id="applicationsList">

<div class="empty">
Загрузка заявок...
</div>

</div>

<!-- USERS -->

<h1 class="title">
Пользователи
</h1>

<div id="usersList">

<div class="empty">
Загрузка пользователей...
</div>

</div>

</div>

<script type="module">

import {
db,
collection,
getDocs,
deleteDoc,
doc,
updateDoc
}
from './firebase.js';

/* APPLICATIONS */

const appsContainer =
document.getElementById(
"applicationsList"
);

async function loadApps(){

try{

appsContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"applications")
);

if(querySnapshot.empty){

appsContainer.innerHTML = `

<div class="empty">

Заявок пока нет

</div>

`;

return;

}

querySnapshot.forEach((documentData)=>{

const app =
documentData.data();

const card =
document.createElement("div");

card.className =
"card";

card.innerHTML = `

<h2>
${app.fullname || "Без имени"}
</h2>

<p>
<b>Discord:</b>
${app.discord || "Не указан"}
</p>

<p>
<b>IC возраст:</b>
${app.icage || "Не указан"}
</p>

<p>
<b>OOC возраст:</b>
${app.oocage || "Не указан"}
</p>

<p>
<b>Почему хочет вступить:</b>
<br><br>
${app.why || "Нет текста"}
</p>

<p>
<b>Чем поможет партии:</b>
<br><br>
${app.help || "Нет текста"}
</p>

<p>
<b>Статус:</b>
${app.status || "pending"}
</p>

<div class="buttons">

<button
class="approve"
data-id="${documentData.id}"
>
Одобрить
</button>

<button
class="delete"
data-id="${documentData.id}"
>
Удалить
</button>

</div>

`;

appsContainer.appendChild(card);

});

/* APPROVE */

document
.querySelectorAll(".approve")
.forEach((button)=>{

button.addEventListener(
"click",
async()=>{

const id =
button.dataset.id;

await updateDoc(
doc(db,"applications",id),
{
status:"approved"
}
);

loadApps();

}
);

});

/* DELETE */

document
.querySelectorAll(".delete")
.forEach((button)=>{

button.addEventListener(
"click",
async()=>{

const id =
button.dataset.id;

await deleteDoc(
doc(db,"applications",id)
);

loadApps();

}
);

});

}catch(error){

appsContainer.innerHTML = `

<div class="empty">

Ошибка загрузки заявок

</div>

`;

}

}

/* USERS */

const usersContainer =
document.getElementById(
"usersList"
);

async function loadUsers(){

try{

usersContainer.innerHTML = "";

const querySnapshot =
await getDocs(
collection(db,"users")
);

if(querySnapshot.empty){

usersContainer.innerHTML = `

<div class="empty">

Пользователей пока нет

</div>

`;

return;

}

querySnapshot.forEach((documentData)=>{

const user =
documentData.data();

const card =
document.createElement("div");

card.className =
"card";

card.innerHTML = `

<h2>
${user.email || "Без email"}
</h2>

<p>
<b>Роль:</b>
${user.role || "user"}
</p>

<p>
<b>Дата регистрации:</b>
${user.created || ""}
</p>

<div class="buttons">

<button
class="admin"
data-id="${documentData.id}"
>
Выдать Admin
</button>

<button
class="delete"
data-id="${documentData.id}"
>
Удалить
</button>

</div>

`;

usersContainer.appendChild(card);

});

/* ADMIN ROLE */

document
.querySelectorAll(".admin")
.forEach((button)=>{

button.addEventListener(
"click",
async()=>{

const id =
button.dataset.id;

await updateDoc(
doc(db,"users",id),
{
role:"admin"
}
);

loadUsers();

}
);

});

}catch(error){

usersContainer.innerHTML = `

<div class="empty">

Ошибка загрузки пользователей

</div>

`;

}

}

/* START */

loadApps();

loadUsers();

</script>

</body>
</html>
