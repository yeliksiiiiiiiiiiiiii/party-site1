<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Вход</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#00154d,#0039a6);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:400px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:30px;
color:#0039a6;
}

input{
width:100%;
padding:15px;
margin-bottom:18px;
border:none;
background:#eef3ff;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
background:#0039a6;
color:white;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#d52b1e;
}

.register-link{
text-align:center;
margin-top:18px;
}

.register-link a{
text-decoration:none;
color:#0039a6;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>Вход</h1>

<input type="text" id="login" placeholder="Логин">

<input type="password" id="password" placeholder="Пароль">

<button onclick="login()">
Войти
</button>

<div class="register-link">
<a href="register.html">Регистрация</a>
</div>

</div>

<script>

function login(){

let login=document.getElementById("login").value;
let password=document.getElementById("password").value;

let users=JSON.parse(localStorage.getItem("users"))||[];

let user=users.find(u=>u.login===login&&u.password===password);

if(user){

localStorage.setItem("currentUser",JSON.stringify(user));

if(user.role==="admin"){
window.location.href="admin.html";
}else{
window.location.href="profile.html";
}

}else{
alert("Неверный логин или пароль");
}

}

</script>

</body>
</html>
