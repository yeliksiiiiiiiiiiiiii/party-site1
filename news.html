<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Новости партии</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7ff;
}

/* HEADER */

header{
background:#00154d;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:30px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
}

/* NEWS */

.container{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.title{
text-align:center;
font-size:50px;
margin-bottom:50px;
color:#0039a6;
}

.news-card{
background:white;
padding:30px;
border-radius:25px;
margin-bottom:35px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.news-card:hover{
transform:translateY(-5px);
}

.news-card img{
width:100%;
border-radius:20px;
margin-top:20px;
max-height:450px;
object-fit:cover;
}

.news-card h2{
font-size:35px;
margin-bottom:15px;
color:#0039a6;
}

.news-card p{
font-size:20px;
margin-top:10px;
}

/* FOOTER */

footer{
background:#00154d;
padding:25px;
text-align:center;
color:white;
margin-top:60px;
}

footer a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">
Россия Для Всех Вместе
</div>

<nav>
<a href="index.html">Главная</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="news.html">Новости</a>
<a href="program.html">Предвыборочная программа</a>
<a href="ustav.html">Устав</a>
<a href="gimn.html">Гимн</a>
<a href="chat.html">Общий чат</a>
</nav>

</header>

<div class="container">

<h1 class="title">
Новости партии
</h1>

<div id="newsContainer"></div>

</div>

<footer>
<a href="https://discord.gg/KHjFC6sDz2">
Наш Discord сервер
</a>
</footer>

<script>

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

let container =
document.getElementById(
"newsContainer"
);

if(news.length===0){

container.innerHTML = `
<div class="news-card">
<h2>Новостей пока нет</h2>
<p>
Ожидайте публикаций администрации.
</p>
</div>
`;

}

news.reverse().forEach(item=>{

container.innerHTML += `

<div class="news-card">

<h2>${item.title}</h2>

<p>${item.text}</p>

<img src="${item.image}">

<p>
<b>Дата:</b>
${item.date}
</p>

</div>

`;

});

</script>

</body>
</html>
