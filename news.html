<!-- NEWS.HTML -->

<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Новости | Либеральная Партия России</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#071739;
color:white;
}

/* ШАПКА */

header{
width:100%;
height:100px;
background:rgba(0,22,70,0.95);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
position:fixed;
top:0;
left:0;
z-index:1000;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:20px;
}

.logo img{
width:60px;
height:60px;
background:white;
padding:5px;
border-radius:10px;
}

.logo h1{
font-size:22px;
line-height:1.2;
}

/* МЕНЮ */

nav{
display:flex;
gap:15px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:white;
font-size:17px;
font-weight:bold;
padding:12px 18px;
border-radius:12px;
transition:0.3s;
}

nav a:hover{
background:#1140b5;
}

/* HERO */

.hero{
width:100%;
height:350px;
background:
linear-gradient(rgba(0,40,120,0.7),
rgba(0,20,70,0.9)),
url('https://images.unsplash.com/photo-1520637836862-4d197d17c38a?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:120px 80px 40px;
}

.hero-content h2{
font-size:70px;
margin-bottom:20px;
}

.hero-content p{
font-size:28px;
color:#d8e4ff;
}

/* НОВОСТИ */

.news-section{
padding:80px;
}

.news-title{
font-size:50px;
margin-bottom:50px;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:35px;
}

.news-card{
background:#0d245f;
border-radius:25px;
overflow:hidden;
transition:0.3s;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.news-card:hover{
transform:translateY(-10px);
}

.news-card img{
width:100%;
height:230px;
object-fit:cover;
}

.news-content{
padding:30px;
}

.news-content h3{
font-size:28px;
margin-bottom:15px;
}

.news-content p{
font-size:18px;
line-height:1.7;
color:#d7e3ff;
margin-bottom:20px;
}

.news-date{
font-size:15px;
color:#7ea2ff;
}

/* ФУТЕР */

footer{
background:#021031;
padding:40px;
text-align:center;
font-size:18px;
margin-top:50px;
}

/* АДАПТИВ */

@media(max-width:900px){

header{
padding:20px;
height:auto;
flex-direction:column;
gap:20px;
}

nav{
justify-content:center;
}

.hero{
padding:180px 30px 50px;
height:auto;
}

.hero-content h2{
font-size:45px;
}

.news-section{
padding:40px 20px;
}

.news-title{
font-size:40px;
}

}

</style>
</head>

<body>

<!-- ШАПКА -->

<header>

<div class="logo">

<img src="logo.png">

<h1>
Либеральная<br>
Партия России
</h1>

</div>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="program.html">Предвыборочная программа</a>
<a href="ustav.html">Устав</a>
<a href="gimn.html">Гимн</a>
<a href="admin.html">Админ</a>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h2>
НОВОСТИ
</h2>

<p>
Последние события партии
</p>

</div>

</section>

<!-- НОВОСТИ -->

<section class="news-section">

<h2 class="news-title">
Последние новости
</h2>

<div class="news-grid" id="newsContainer">

</div>

</section>

<!-- ФУТЕР -->

<footer>

© 2025 Либеральная Партия России — Для Всех Вместе

</footer>

<!-- FIREBASE -->

<script type="module">

import {
db,
collection,
getDocs
}
from './firebase.js';

const newsContainer =
document.getElementById(
"newsContainer"
);

async function loadNews(){

const querySnapshot =
await getDocs(
collection(db,"news")
);

newsContainer.innerHTML = "";

querySnapshot.forEach((doc)=>{

const news = doc.data();

newsContainer.innerHTML += `

<div class="news-card">

<img src="${
news.image ||
'https://images.unsplash.com/photo-1529101091764-c3526daf38fe?q=80&w=1974&auto=format&fit=crop'
}">

<div class="news-content">

<h3>
${news.title}
</h3>

<p>
${news.text}
</p>

<div class="news-date">

${news.date || "Новая публикация"}

</div>

</div>

</div>

`;

});

}

loadNews();

</script>

</body>
</html>
