<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Новости партии
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
}

/* HEADER */

header{

background:#0b2d82;

padding:20px 50px;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

display:flex;
align-items:center;
gap:15px;

}

.logo img{

width:60px;
background:white;
padding:5px;
border-radius:10px;

}

.logo h1{

color:white;
font-size:32px;

}

nav{

display:flex;
gap:15px;

}

nav a{

color:white;
text-decoration:none;
font-weight:bold;

}

/* PAGE */

.page{

width:92%;
max-width:1500px;

margin:60px auto;

}

.page h2{

font-size:60px;
color:#0b2d82;

margin-bottom:40px;

}

/* NEWS */

.news-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(350px,1fr));

gap:30px;

}

.news-card{

background:white;

border-radius:30px;

overflow:hidden;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

padding:30px;

text-align:center;

}

.news-card h3{

font-size:32px;
margin-bottom:15px;

color:#0b2d82;

}

.news-card p{

font-size:18px;
line-height:1.7;

color:#444;

}

/* EMPTY */

.empty{

background:white;

padding:60px;

border-radius:30px;

text-align:center;

font-size:26px;

color:#555;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

}

/* FOOTER */

footer{

margin-top:80px;

background:#0b2d82;

padding:40px;

text-align:center;

color:white;

font-size:18px;

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<h1>
Либеральная Партия России
</h1>

</div>

<nav>

<a href="index.html">
Главная
</a>

<a href="leaders.html">
Руководство
</a>

<a href="apply.html">
Заявление
</a>

<a href="profile.html">
Профиль
</a>

</nav>

</header>

<div class="page">

<h2>
Новости партии
</h2>

<div id="newsContainer">

<div class="empty">

Новостей пока нет

</div>

</div>

</div>

<footer>

© 2026 Либеральная Партия России

<br><br>

Россия Для Всех Вместе

</footer>

<script>

/* ПОЛНАЯ ОЧИСТКА НОВОСТЕЙ */

localStorage.removeItem("news");

</script>

</body>
</html>
