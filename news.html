<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Новости</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.news-card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-bottom:35px;
}

.news-card img{
width:100%;
max-height:450px;
object-fit:cover;
}

.news-content{
padding:25px;
}
</style>
</head>
<body>

<div class="container" id="newsContainer"></div>

<script>

function loadNews(){

let news=
JSON.parse(localStorage.getItem("partyNews")) || [];

let container=
document.getElementById("newsContainer");

container.innerHTML="";

news.reverse().forEach((item)=>{

container.innerHTML += `
<div class="news-card">
<img src="${item.image}">
<div class="news-content">
<h2>${item.title}</h2>
<p>${item.text}</p>
<p>${item.date}</p>
</div>
</div>
`;

});

}

loadNews();

</script>

</body>
</html>
