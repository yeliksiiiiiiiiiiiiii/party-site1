<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Новости</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f7ff;
}

header{
background:linear-gradient(135deg,#0039a6,#001b5e);
color:white;
padding:60px 20px;
text-align:center;
}

header h1{
font-size:54px;
}

nav{
background:white;
padding:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

nav a{
text-decoration:none;
color:#0039a6;
margin:0 18px;
font-weight:bold;
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.news-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:35px;
}

.news-card img{
width:100%;
max-height:450px;
object-fit:cover;
}

.news-content{
padding:30px;
}

.news-content h2{
color:#0039a6;
margin-bottom:15px;
}

footer{
background:#0039a6;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<h1>Новости партии</h1>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="admin.html">Админ панель</a>

</nav>

<div class="container" id="newsContainer">

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

function loadNews(){

let news =
JSON.parse(
localStorage.getItem(
"partyNews"
)
) || [];

let container =
document.getElementById(
"newsContainer"
);

container.innerHTML = "";

if(news.length === 0){

container.innerHTML = `
<div class="news-card">
<div class="news-content">
<h2>Новостей пока нет</h2>
<p>
Новости появятся после публикации
в админ панели.
</p>
</div>
</div>
`;

return;

}

news.reverse().forEach((item)=>{

container.innerHTML += `

<div class="news-card">

<img src="${item.image}">

<div class="news-content">

<h2>${item.title}</h2>

<p>${item.text}</p>

<br>

<p>
<b>Дата:</b>
${item.date}
</p>

</div>

</div>

`;

});

}

loadNews();

</script>

</body>
</html>
