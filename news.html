<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Новости</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2ff;
}

header{
background:#0039a6;
color:white;
text-align:center;
padding:35px;
}

nav{
background:#00246b;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.news-card{
background:white;
border-radius:20px;
overflow:hidden;
margin-bottom:35px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.news-card img{
width:100%;
max-height:450px;
object-fit:cover;
}

.news-content{
padding:25px;
}

.news-date{
color:gray;
margin-bottom:15px;
}

</style>
</head>

<body>

<header>

<h1>Новости партии</h1>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="admin.html">Админ панель</a>

</nav>

<div class="container" id="newsContainer">

</div>

<script>

function loadNews(){

let news =
JSON.parse(localStorage.getItem("partyNews")) || [];

let container =
document.getElementById("newsContainer");

container.innerHTML = "";

if(news.length === 0){

container.innerHTML =
"<h2>Новостей пока нет.</h2>";

return;

}

news.reverse().forEach((item)=>{

container.innerHTML += `

<div class="news-card">

<img src="${item.image}">

<div class="news-content">

<div class="news-date">
${item.date}
</div>

<h2>${item.title}</h2>

<p>${item.text}</p>

</div>

</div>

`;

});

}

loadNews();

</script>

</body>
</html>
