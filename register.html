<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<title>
Регистрация
</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#00154d;
font-family:Arial;
}

.box{
width:400px;
background:white;
padding:40px;
border-radius:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:12px;
border:1px solid #ccc;
font-size:17px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0039a6;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>
Регистрация
</h1>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

</div>

<script type="module">

import {
auth,
createUserWithEmailAndPassword
}
from './firebase.js';

window.register =
async function(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert(
"Аккаунт создан"
);

location.href =
"login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
