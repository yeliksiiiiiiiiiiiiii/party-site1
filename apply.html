<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Заявление</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f7ff;
}

header{
background:linear-gradient(135deg,#0039a6,#001b5e);
color:white;
padding:60px 20px;
text-align:center;
}

header h1{
font-size:54px;
}

nav{
background:white;
padding:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

nav a{
text-decoration:none;
color:#0039a6;
margin:0 18px;
font-weight:bold;
font-size:18px;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.form-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-box h2{
text-align:center;
margin-bottom:30px;
color:#0039a6;
}

input,
textarea{
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:2px solid #dbe4ff;
font-size:16px;
}

textarea{
min-height:140px;
resize:vertical;
}

button{
width:100%;
padding:16px;
background:#0039a6;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#d52b1e;
}

footer{
background:#0039a6;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<h1>Заявление в партию</h1>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="admin.html">Админ панель</a>

</nav>

<div class="container">

<div class="form-box">

<h2>Форма вступления</h2>

<form id="partyForm">

<input type="text"
id="fullname"
placeholder="Ваше ФИО"
required>

<input type="number"
id="ageic"
placeholder="Сколько вам лет? (IC)"
required>

<input type="number"
id="ageooc"
placeholder="Сколько вам лет? (OOC)"
required>

<input type="text"
id="discord"
placeholder="Ваш Discord"
required>

<textarea
id="reason"
placeholder="Почему именно наша партия?"
required></textarea>

<textarea
id="support"
placeholder="Как вы будете поддерживать партию?"
required></textarea>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

document.getElementById(
"partyForm"
).addEventListener("submit",function(e){

e.preventDefault();

let application = {

fullname:
document.getElementById(
"fullname"
).value,

ageic:
document.getElementById(
"ageic"
).value,

ageooc:
document.getElementById(
"ageooc"
).value,

discord:
document.getElementById(
"discord"
).value,

reason:
document.getElementById(
"reason"
).value,

support:
document.getElementById(
"support"
).value

};

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

applications.push(application);

localStorage.setItem(
"partyApplications",
JSON.stringify(applications)
);

alert(
"Ваше заявление успешно отправлено!"
);

document.getElementById(
"partyForm"
).reset();

});

</script>

</body>
</html>
