<script>

document.getElementById(
"partyForm"
).addEventListener("submit",function(e){

e.preventDefault();

let application = {

fullname:
document.getElementById("fullname").value,

ageic:
document.getElementById("ageic").value,

ageooc:
document.getElementById("ageooc").value,

discord:
document.getElementById("discord").value,

reason:
document.getElementById("reason").value,

support:
document.getElementById("support").value

};

/* СОХРАНЕНИЕ ЗАЯВОК */

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

applications.push(application);

localStorage.setItem(
"partyApplications",
JSON.stringify(applications)
);

/* DISCORD WEBHOOK */

fetch(
"https://discord.com/api/webhooks/1502654265284362321/ZsEt4asD9JKcjQ-_9IzUQ2cxrCbCR_wvWIjBZMgiW6jRWWAGgJWR0HgKdqtx_9GKE8j2",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:"Либеральная Партия России",

avatar_url:
"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",

embeds:[{

title:"📨 Новая заявка в партию",

description:
"Поступила новая заявка с сайта партии.",

color:3447003,

fields:[

{
name:"👤 ФИО",
value:application.fullname || "Не указано"
},

{
name:"🎂 Возраст IC",
value:application.ageic || "Не указано",
inline:true
},

{
name:"🧍 Возраст OOC",
value:application.ageooc || "Не указано",
inline:true
},

{
name:"💬 Discord",
value:application.discord || "Не указано"
},

{
name:"📌 Почему партия",
value:application.reason || "Не указано"
},

{
name:"🤝 Поддержка партии",
value:application.support || "Не указано"
}

],

footer:{
text:"Либеральная Партия России"
},

timestamp:new Date()

}]

})

}

)

.then(() => {

alert(
"Ваше заявление успешно отправлено!"
);

document.getElementById(
"partyForm"
).reset();

})

.catch(() => {

alert(
"Ошибка отправки заявления!"
);

});

});

</script>
