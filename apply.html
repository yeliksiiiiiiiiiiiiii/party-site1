<!-- APPLY.HTML -->

<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Заявление в партию
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#071739;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:105px;
background:rgba(2,15,60,0.92);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 55px;
z-index:1000;
backdrop-filter:blur(10px);
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:18px;
}

.logo img{
width:58px;
height:58px;
background:white;
padding:5px;
border-radius:4px;
}

.logo-text{
color:white;
font-size:25px;
font-weight:bold;
line-height:1.1;
}

/* NAV */

nav{
display:flex;
gap:38px;
}

nav a{
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
transition:0.3s;
position:relative;
}

nav a:hover{
color:#ff3c2f;
}

nav a::after{
content:'';
position:absolute;
left:0;
bottom:-8px;
width:0%;
height:3px;
background:#ff3c2f;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* HERO */

.hero{
width:100%;
min-height:100vh;

background:
linear-gradient(
rgba(3,24,94,0.85),
rgba(3,24,94,0.85)
),

url('https://images.unsplash.com/photo-1513326738677-b964603b136d?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

padding:180px 20px 80px;
}

/* FORM */

.form-box{

width:100%;
max-width:900px;

background:white;

padding:60px;

border-radius:35px;

box-shadow:0 15px 40px rgba(0,0,0,0.35);

}

.form-box h1{

font-size:55px;
color:#0b2d82;
margin-bottom:15px;
text-align:center;

}

.form-box p{

text-align:center;
font-size:22px;
color:#666;
margin-bottom:40px;

}

.form-group{
margin-bottom:25px;
}

.form-group label{

display:block;

margin-bottom:10px;

font-size:20px;
font-weight:bold;
color:#0b2d82;

}

.form-group input,
.form-group textarea{

width:100%;

padding:18px;

border:none;

background:#eef3ff;

border-radius:18px;

font-size:18px;

outline:none;

}

.form-group textarea{
height:160px;
resize:none;
}

/* BUTTON */

button{

width:100%;

padding:22px;

border:none;

background:#ff3c2f;

color:white;

font-size:26px;

font-weight:bold;

border-radius:20px;

cursor:pointer;

transition:0.3s;

box-shadow:0 10px 25px rgba(255,60,47,0.4);

}

button:hover{

transform:translateY(-5px);

background:#ff564b;

}

/* MOBILE */

@media(max-width:1200px){

header{
flex-direction:column;
height:auto;
padding:20px;
gap:20px;
}

nav{
flex-wrap:wrap;
justify-content:center;
}

}

@media(max-width:700px){

.logo-text{
font-size:18px;
}

nav a{
font-size:16px;
}

.form-box{
padding:35px;
}

.form-box h1{
font-size:36px;
}

.form-box p{
font-size:18px;
}

button{
font-size:20px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<div class="logo-text">
Либеральная<br>
Партия России
</div>

</div>

<nav>

<a href="index.html">
Главная
</a>

<a href="news.html">
Новости
</a>

<a href="leaders.html">
Руководство
</a>

<a href="apply.html">
Заявление
</a>

<a href="profile.html">
Предвыборочная программа
</a>

<a href="admin.html">
Админ
</a>

<a href="ustav.html">
Устав
</a>

<a href="gimn.html">
Гимн
</a>

</nav>

</header>

<section class="hero">

<div class="form-box">

<h1>
Заявление в партию
</h1>

<p>
Заполните официальную форму
для вступления в Либеральную Партию России
</p>

<form id="applicationForm">

<div class="form-group">

<label>
Ваше ФИО
</label>

<input
type="text"
id="fullname"
required
>

</div>

<div class="form-group">

<label>
IC возраст
</label>

<input
type="number"
id="icage"
required
>

</div>

<div class="form-group">

<label>
OOC возраст
</label>

<input
type="number"
id="oocage"
required
>

</div>

<div class="form-group">

<label>
Discord
</label>

<input
type="text"
id="discord"
required
>

</div>

<div class="form-group">

<label>
Почему хотите вступить?
</label>

<textarea
id="why"
required
></textarea>

</div>

<div class="form-group">

<label>
Чем будете полезны партии?
</label>

<textarea
id="help"
required
></textarea>

</div>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

</section>

<script type="module">

import {
db,
collection,
addDoc
}
from "./firebase.js";

const form =
document.getElementById(
"applicationForm"
);

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

await addDoc(
collection(
db,
"applications"
),
{

fullname:
document.getElementById(
"fullname"
).value,

icage:
document.getElementById(
"icage"
).value,

oocage:
document.getElementById(
"oocage"
).value,

discord:
document.getElementById(
"discord"
).value,

why:
document.getElementById(
"why"
).value,

help:
document.getElementById(
"help"
).value,

status:"pending",

created:
new Date()

}
);

alert(
"Заявление отправлено"
);

form.reset();

});

</script>

</body>
</html>
