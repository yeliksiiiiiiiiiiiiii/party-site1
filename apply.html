<!-- APPLY.HTML -->

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Заявление в партию
</title>

<style>

body{

margin:0;
padding:0;
font-family:Arial;
background:#071739;
color:white;

}

header{

background:#00154d;
padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px black;

}

.container{

width:90%;
max-width:800px;
margin:50px auto;

}

.form-box{

background:#0b1d57;
padding:40px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.5);

}

.form-box h1{

text-align:center;
margin-bottom:30px;

}

input,
textarea{

width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:17px;
background:#132b75;
color:white;

}

textarea{

height:150px;
resize:none;

}

button{

width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#0051ff;
color:white;
font-size:20px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#2f6dff;
transform:scale(1.02);

}

</style>

</head>

<body>

<header>
Заявление в партию
</header>

<div class="container">

<div class="form-box">

<h1>
Подать заявление
</h1>

<form id="applicationForm">

<input
type="text"
id="fullname"
placeholder="Ваше имя"
required
>

<input
type="number"
id="icage"
placeholder="IC возраст"
required
>

<input
type="number"
id="oocage"
placeholder="OOC возраст"
required
>

<input
type="text"
id="discord"
placeholder="Discord"
required
>

<textarea
id="why"
placeholder="Почему хотите вступить?"
></textarea>

<textarea
id="help"
placeholder="Чем будете полезны партии?"
></textarea>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

</div>

<script type="module">

import {
db,
collection,
addDoc
}
from './firebase.js';

const form =
document.getElementById(
"applicationForm"
);

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

await addDoc(
collection(db,"applications"),
{

fullname:
document.getElementById(
"fullname"
).value,

icage:
document.getElementById(
"icage"
).value,

oocage:
document.getElementById(
"oocage"
).value,

discord:
document.getElementById(
"discord"
).value,

why:
document.getElementById(
"why"
).value,

help:
document.getElementById(
"help"
).value,

status:"pending",

created:
new Date()

}
);

alert(
"Заявление отправлено"
);

form.reset();

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
