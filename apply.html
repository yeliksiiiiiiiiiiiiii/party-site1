<!DOCTYPE html>
padding:18px;
background:#2563eb;
color:white;
border:none;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#dc2626;
}
</style>
</head>
<body>

<div class="container">
<div class="form-box">

<h1>Заявление на вступление</h1>

<form id="partyForm">

<input type="text" id="fullname" placeholder="Ваше ФИО" required>

<input type="number" id="ageic" placeholder="Сколько вам лет? (IC)" required>

<input type="number" id="ageooc" placeholder="Сколько вам лет? (OOC)" required>

<input type="text" id="discord" placeholder="Ваш Discord" required>

<textarea id="reason" placeholder="Почему именно наша партия?" required></textarea>

<textarea id="support" placeholder="Как вы будете поддерживать партию?" required></textarea>

<button type="submit">Отправить заявление</button>

</form>

</div>
</div>

<script>

document.getElementById(
"partyForm"
).addEventListener("submit",function(e){

 e.preventDefault();

 let application={
 fullname:document.getElementById("fullname").value,
 ageic:document.getElementById("ageic").value,
 ageooc:document.getElementById("ageooc").value,
 discord:document.getElementById("discord").value,
 reason:document.getElementById("reason").value,
 support:document.getElementById("support").value
 };

 let applications=
 JSON.parse(localStorage.getItem("partyApplications")) || [];

 applications.push(application);

 localStorage.setItem(
 "partyApplications",
 JSON.stringify(applications)
 );

 alert("Заявление успешно отправлено!");

 document.getElementById("partyForm").reset();

});

</script>

</body>
</html>
