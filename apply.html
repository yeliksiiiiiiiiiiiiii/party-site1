<!-- ЗАМЕНИ ТОЛЬКО CSS ДЛЯ NAV -->

<style>

/* NAVIGATION */

nav{
display:flex;
justify-content:flex-end;
align-items:center;
gap:20px;
padding:20px 40px;
background:#ffffff;
border-bottom:1px solid #dbe4f0;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:#0051ff;
text-decoration:none;
padding:12px 20px;
border-radius:12px;
background:#edf3ff;
transition:0.3s;
font-size:17px;
font-weight:bold;
}

nav a:hover{
background:#0051ff;
color:white;
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:700px){

nav{
justify-content:center;
padding:15px;
gap:10px;
}

nav a{
font-size:15px;
padding:10px 14px;
}

}

</style>
