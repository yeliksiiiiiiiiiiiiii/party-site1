<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Заявление в партию</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#eef2ff;
}

/* HEADER */

header{
background:linear-gradient(
135deg,
#0039a6,
#00246b
);

color:white;
text-align:center;
padding:60px 20px;
}

header h1{
font-size:52px;
margin-bottom:10px;
}

header p{
font-size:22px;
}

/* NAV */

nav{
background:#00246b;
padding:18px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#ffcccc;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:50px 20px;
}

/* FORM */

.form-box{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.form-box h2{
text-align:center;
color:#0039a6;
margin-bottom:30px;
font-size:36px;
}

/* INPUTS */

input,
textarea{
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:2px solid #ccd8ff;
font-size:16px;
transition:0.3s;
}

input:focus,
textarea:focus{
border-color:#0039a6;
outline:none;
box-shadow:0 0 10px rgba(0,57,166,0.2);
}

textarea{
min-height:140px;
resize:vertical;
}

/* BUTTON */

button{
width:100%;
padding:18px;
background:#0039a6;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#d52b1e;
transform:scale(1.02);
}

/* FOOTER */

footer{
background:#0039a6;
color:white;
text-align:center;
padding:25px;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<h1>Либеральная Партия России</h1>

<p>Для Всех Вместе</p>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="admin.html">Админ панель</a>

</nav>

<div class="container">

<div class="form-box">

<h2>Заявление на вступление</h2>

<form id="partyForm">

<input type="text"
id="fullname"
placeholder="Ваше ФИО"
required>

<input type="number"
id="ageic"
placeholder="Сколько вам лет? (IC)"
required>

<input type="number"
id="ageooc"
placeholder="Сколько вам лет? (OOC)"
required>

<input type="text"
id="discord"
placeholder="Ваш Discord?"
required>

<textarea
id="reason"
placeholder="Почему именно наша партия?"
required></textarea>

<textarea
id="support"
placeholder="Как вы будете поддерживать партию?"
required></textarea>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

document.getElementById(
"partyForm"
).addEventListener("submit",function(e){

e.preventDefault();

let application = {

fullname:
document.getElementById(
"fullname"
).value,

ageic:
document.getElementById(
"ageic"
).value,

ageooc:
document.getElementById(
"ageooc"
).value,

discord:
document.getElementById(
"discord"
).value,

reason:
document.getElementById(
"reason"
).value,

support:
document.getElementById(
"support"
).value

};

/* LOCAL STORAGE */

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

applications.push(application);

localStorage.setItem(
"partyApplications",
JSON.stringify(applications)
);

alert(
"Ваше заявление успешно отправлено!"
);

document.getElementById(
"partyForm"
).reset();

});

</script>

</body>
</html>
