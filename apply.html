<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявление в партию</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#eef2ff;
}

header{
    background:#0039a6;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
    font-size:42px;
}

header p{
    margin-top:10px;
    font-size:20px;
}

nav{
    background:#002b7f;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#ffcccc;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.form-box{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.form-box h2{
    text-align:center;
    color:#0039a6;
    margin-bottom:30px;
}

input,
textarea{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border-radius:12px;
    border:2px solid #c7d2ff;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    min-height:140px;
    resize:vertical;
}

button{
    width:100%;
    padding:18px;
    background:#0039a6;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#d52b1e;
}

footer{
    margin-top:50px;
    background:#0039a6;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>
    <h1>Либеральная Партия России</h1>
    <p>Для Всех Вместе</p>
</header>

<nav>
    <a href="index.html">Главная</a>
    <a href="leaders.html">Руководство</a>
    <a href="profile.html">Личный кабинет</a>
    <a href="apply.html">Заявление</a>
    <a href="admin.html">Админ панель</a>
    <a href="news.html">Новости</a>
</nav>

<div class="container">

<div class="form-box">

<h2>Заявление на вступление</h2>

<form id="partyForm">

<input type="text"
id="fullname"
placeholder="Ваше ФИО"
required>

<input type="number"
id="ageic"
placeholder="Сколько вам лет? (IC)"
required>

<input type="number"
id="ageooc"
placeholder="Сколько вам лет? (OOC)"
required>

<input type="text"
id="discord"
placeholder="Ваш Discord?"
required>

<textarea
id="reason"
placeholder="Почему именно наша партия?"
required></textarea>

<textarea
id="support"
placeholder="Ваш дискорд?"
required></textarea>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

</div>

<footer>
© 2025 Либеральная Партия России
</footer>

<script>

document.getElementById("partyForm").addEventListener("submit", function(e){

    e.preventDefault();

    let application = {

        fullname: document.getElementById("fullname").value,
        ageic: document.getElementById("ageic").value,
        ageooc: document.getElementById("ageooc").value,
        discord: document.getElementById("discord").value,
        reason: document.getElementById("reason").value,
        support: document.getElementById("support").value

    };

    let applications = JSON.parse(localStorage.getItem("partyApplications")) || [];

    applications.push(application);

    localStorage.setItem("partyApplications", JSON.stringify(applications));

    alert("Ваше заявление успешно отправлено!");

    document.getElementById("partyForm").reset();

});

</script>

</body>
</html>
