<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Заявление</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7ff;
}

/* HEADER */

header{
background:#00154d;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:30px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
}

/* MAIN */

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.title{
text-align:center;
font-size:45px;
margin-bottom:35px;
color:#0039a6;
}

input,
textarea{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
background:#eef3ff;
border-radius:15px;
font-size:18px;
}

textarea{
height:150px;
resize:none;
}

button{
width:100%;
padding:18px;
border:none;
background:#0039a6;
color:white;
font-size:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#d52b1e;
}

footer{
background:#00154d;
padding:25px;
text-align:center;
color:white;
margin-top:60px;
}

footer a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">
Россия Для Всех Вместе
</div>

<nav>
<a href="index.html">Главная</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>
<a href="news.html">Новости</a>
<a href="ustav.html">Устав</a>
<a href="gimn.html">Гимн</a>
<a href="program.html">Программа</a>
</nav>

</header>

<div class="container">

<h1 class="title">
Заявление в партию
</h1>

<form id="applicationForm">

<input type="text"
id="fullname"
placeholder="Ваше ФИО"
required>

<input type="text"
id="ageic"
placeholder="Сколько вам лет? (IC)"
required>

<input type="text"
id="ageooc"
placeholder="Сколько вам лет? (OOC)"
required>

<input type="text"
id="discord"
placeholder="Ваш Discord?"
required>

<textarea
id="reason"
placeholder="Почему именно наша партия?"
required></textarea>

<textarea
id="support"
placeholder="Как вы будете поддерживать партию?"
required></textarea>

<button type="submit">
Отправить заявление
</button>

</form>

</div>

<footer>
<a href="https://discord.gg/KHjFC6sDz2">
Наш Discord сервер
</a>
</footer>

<script>

document.getElementById(
"applicationForm"
).addEventListener(
"submit",
function(e){

e.preventDefault();

let applications =
JSON.parse(
localStorage.getItem(
"partyApplications"
)
) || [];

applications.push({

fullname:
document.getElementById(
"fullname"
).value,

ageic:
document.getElementById(
"ageic"
).value,

ageooc:
document.getElementById(
"ageooc"
).value,

discord:
document.getElementById(
"discord"
).value,

reason:
document.getElementById(
"reason"
).value,

support:
document.getElementById(
"support"
).value

});

localStorage.setItem(
"partyApplications",
JSON.stringify(applications)
);

alert(
"Заявление отправлено!"
);

document.getElementById(
"applicationForm"
).reset();

});

</script>

</body>
</html>
