<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Либеральная Партия России</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#071739;
overflow-x:hidden;
}

/* ШАПКА */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:105px;
background:rgba(2,15,60,0.92);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 55px;
z-index:1000;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:18px;
}

.logo img{
width:58px;
height:58px;
background:white;
padding:5px;
border-radius:4px;
}

.logo-text{
color:white;
font-size:25px;
font-weight:bold;
line-height:1.1;
}

/* МЕНЮ */

nav{
display:flex;
gap:38px;
}

nav a{
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
transition:0.3s;
position:relative;
}

nav a:hover{
color:#ff3c2f;
}

nav a::after{
content:'';
position:absolute;
left:0;
bottom:-8px;
width:0%;
height:3px;
background:#ff3c2f;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* HERO */

.hero{
width:100%;
height:100vh;

background:
linear-gradient(
rgba(3,24,94,0.82),
rgba(3,24,94,0.82)
),

url('https://images.unsplash.com/photo-1513326738677-b964603b136d?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
padding-left:80px;
padding-top:120px;
}

/* ТЕКСТ */

.hero-content{
max-width:850px;
}

.hero-content h1{
font-size:95px;
line-height:1;
font-weight:900;
color:white;
margin-bottom:35px;
text-transform:uppercase;
}

.hero-content p{
font-size:42px;
color:white;
margin-bottom:45px;
}

/* КНОПКА */

.hero-content a{
display:inline-block;
padding:22px 48px;
background:#ff3c2f;
color:white;
text-decoration:none;
font-size:28px;
font-weight:bold;
border-radius:18px;
transition:0.3s;
box-shadow:0 10px 30px rgba(255,60,47,0.4);
}

.hero-content a:hover{
transform:translateY(-5px);
background:#ff564b;
}

/* АДАПТИВ */

@media(max-width:1400px){

.hero-content h1{
font-size:70px;
}

nav{
gap:22px;
}

nav a{
font-size:18px;
}

}

@media(max-width:1100px){

header{
flex-direction:column;
height:auto;
padding:20px;
gap:20px;
}

nav{
flex-wrap:wrap;
justify-content:center;
}

.hero{
padding:220px 40px 0 40px;
}

.hero-content h1{
font-size:58px;
}

.hero-content p{
font-size:30px;
}

}

@media(max-width:700px){

.hero-content h1{
font-size:42px;
}

.hero-content p{
font-size:22px;
}

.hero-content a{
font-size:20px;
padding:18px 35px;
}

.logo-text{
font-size:18px;
}

nav a{
font-size:16px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<div class="logo-text">
Либеральная<br>
Партия России
</div>

</div>

<nav>

<a href="index.html">
Главная
</a>

<a href="news.html">
Новости
</a>

<a href="leaders.html">
Руководство
</a>

<a href="apply.html">
Заявление
</a>

<a href="profile.html">
Профиль
</a>

<a href="admin.html">
Админ
</a>

<a href="ustav.html">
Устав
</a>

<a href="gimn.html">
Гимн
</a>

<a href="program.html">
Предвыборочная программа
</a>

</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>
ЛИБЕРАЛЬНАЯ<br>
ПАРТИЯ РОССИИ
</h1>

<p>
Для Всех Вместе
</p>

<a href="apply.html">
Вступить в партию
</a>

</div>

</section>

</body>
</html>
