<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Либеральная Партия России</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2ff;
}

header{
    background:linear-gradient(135deg,#0039a6,#00246b);
    color:white;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:56px;
}

header p{
    font-size:24px;
}

nav{
    background:#00246b;
    padding:18px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:35px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.discord{
    background:#5865F2;
    color:white;
    text-align:center;
    padding:35px;
    margin-top:50px;
}

.discord a{
    color:white;
    text-decoration:none;
    font-size:22px;
}

footer{
    background:#0039a6;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>

<h1>Либеральная Партия России</h1>

<p>Для Всех Вместе</p>

</header>

<nav>

<a href="index.html">Главная</a>
<a href="news.html">Новости</a>
<a href="leaders.html">Руководство</a>
<a href="apply.html">Заявление</a>

</nav>

<div class="container">

<div class="card">

<h2>Добро пожаловать</h2>

<p>
Официальный сайт Либеральной Партии России.
</p>

</div>

<div class="card">

<h2>Последние новости</h2>

<div id="latestNews"></div>

</div>

</div>

<div class="discord">

<h2>Наш Discord сервер</h2>

<a href="https://discord.gg/KHjFC6sDz2"
target="_blank">
discord.gg/KHjFC6sDz2
</a>

</div>

<footer>

© 2025 Либеральная Партия России

</footer>

<script>

let news =
JSON.parse(localStorage.getItem("partyNews")) || [];

let latest =
document.getElementById("latestNews");

if(news.length === 0){

latest.innerHTML =
"<p>Новостей пока нет.</p>";

}else{

let item = news[news.length - 1];

latest.innerHTML = `

<h3>${item.title}</h3>

<p>${item.text}</p>

`;

}

</script>

</body>
</html>
